<div class="widget">
  <h3 class="widget-title">搜尋本站</h3>
  <form class="search" action="https://www.google.com/search" method="get" target="_blank" rel="noopener">
    <input type="hidden" name="q" value="site:{{ site.url | default: site.github.url | replace: 'http://','https://' | replace:'https://','' }}">
    <input type="text" name="q" placeholder="搜尋關鍵字…"
           onfocus="this.previousElementSibling.name='q';this.value='site:{{ site.url | default: site.github.url | replace:'http://','https://' | replace:'https://','' }} '">
    <button type="submit">搜尋</button>
  </form>
</div>

<div class="widget">
  <h3 class="widget-title">近期文章</h3>
  <ul class="list">
    {%- for p in site.posts limit:8 -%}
      <li><a href="{{ p.url | relative_url }}">{{ p.title }}</a></li>
    {%- endfor -%}
  </ul>
</div>
