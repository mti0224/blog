<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/custom.css' | relative_url }}">
</head>
<body>
  <header class="site-topbar">
    <div class="container flex-between">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}">首頁</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <article class="post">
      <h1>{{ page.title }}</h1>
      <div class="meta">{{ page.date | date: "%Y-%m-%d" }}
        {% if page.tags and page.tags.size > 0 %} · {{ page.tags | join:', ' }}{% endif %}
      </div>
      <div class="content">
        {{ content }}
      </div>
    </article>
  </main>

  <script src="{{ '/assets/yt-embed.js' | relative_url }}"></script>
</body>
</html>
