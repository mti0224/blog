---
layout: default
---

<article class="post-page">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="meta">{{ page.date | date: "%Y-%m-%d" }}</div>
    {% if page.image %}
      <img class="post-hero" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
    {% endif %}
  </header>

  <div id="post-content" class="post-content">
    {{ content }}
  </div>
</article>

<script>
/* 把文章開頭若出現的 "image: /assets/..." 文字行隱藏（有些匯入檔會把它留在內文） */
(function(){
  var el = document.getElementById('post-content');
  if (!el) return;
  var first = el.firstElementChild;
  if (first && first.tagName === 'P' && /^image:\s*\/assets\//i.test(first.textContent.trim())) {
    first.style.display = 'none';
  }
})();
</script>
