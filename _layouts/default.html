---
layout: nil
---

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">

  <style>
    .wc-header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid rgba(0,0,0,.06)}
    .wc-header-inner{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
    .wc-brand{font-weight:800;font-size:20px;color:#111827;text-decoration:none;white-space:nowrap}
    .wc-spacer{flex:1}
    .wc-social a{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;margin-left:10px;opacity:.85}
    .wc-social img{display:block;width:100%;height:100%;object-fit:contain}

    .wc-main{max-width:980px;margin:24px auto;padding:0 16px}

    .wc-article-title{font-size:clamp(28px,4vw,42px);line-height:1.2;margin:0 0 12px;font-weight:800}
    .wc-hero-figure{margin:0 0 16px}
    .wc-hero-figure img{display:block;width:100%;height:auto;border-radius:12px}

    .wc-video{position:relative;width:100%;padding-top:56.25%;margin:14px 0;border-radius:12px;overflow:hidden;background:#000}
    .wc-video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  </style>
</head>
<body>

  <header class="wc-header">
    <div class="wc-header-inner">
      <a class="wc-brand" href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a>
      <div class="wc-spacer"></div>
      <nav class="wc-social" aria-label="social links">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener" aria-label="YouTube">
          <img src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener" aria-label="Instagram">
          <img src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener" aria-label="Discord">
          <img src="{{ '/assets/icon/discord.png' | relative_url }}" alt="">
        </a>
      </nav>
    </div>
  </header>

  <main class="wc-main" id="wc-main">
    {{ content }}
  </main>

  <script>
  (function(){
    var main = document.getElementById('wc-main');
    if(!main) return;

    var originalHTML = main.innerHTML;
    var rawText = (function(tmp){
      var div = document.createElement('div'); div.innerHTML = tmp;
      return (div.textContent || "");
    })(originalHTML);

    function pick(re, src){var m=String(src||"").match(re);return (m&&m[1])?m[1].trim():"";}
    var title = pick(/post title:\s*["']?([^"\n\r]+)["']?/i, rawText) ||
                pick(/posttitle:\s*["']?([^"\n\r]+)["']?/i, rawText) ||
                pick(/title:\s*["']?([^"\n\r]+)["']?/i, rawText) || "";
    var thumbId   = pick(/_thumbnail_id:\s*["']?(\d+)["']?/i, rawText);
    var imagePath = pick(/image:\s*["']?([^\s"'<>]+?\.(?:png|jpe?g|webp|gif))["']?/i, rawText);

    /* 清掉畫面上的前置雜訊（只清最前一段 --- ... ---） */
    (function stripFrontMatter(){
      var html = originalHTML.replace(/^\s*---[\s\S]{0,3000}?---\s*/,'');
      html = html.replace(/_oembed_[^\n<]+/gi, '')
                 .replace(/(firehose_sent|timeline_notification|_publicize_job_id|_elasticsearch_data_sharing_indexed_on|display_name:|author:)[^\n<]*/gi,'');
      main.innerHTML = html;
    })();

    /* 標題 + 精選大圖 */
    function addHero(src){
      if(!src) return;
      var fig=document.createElement('figure'); fig.className='wc-hero-figure';
      var img=new Image(); img.src=src; img.alt=title||''; fig.appendChild(img);
      var anchor = main.firstElementChild || null;
      if(title){
        var h=document.createElement('h1'); h.className='wc-article-title'; h.textContent=title;
        main.insertBefore(h, anchor);
        main.insertBefore(fig, h.nextSibling);
      }else{
        main.insertBefore(fig, anchor);
      }
    }
    var base = "{{ site.baseurl | default: '' }}";
    if(thumbId){
      fetch("{{ '/assets/featured-map.json' | relative_url }}")
        .then(function(r){return r.json()})
        .then(function(map){
          if(map && map[thumbId]){
            var val = map[thumbId];
            addHero(/^https?:\/\//i.test(val) ? val : (base + val));
          }else if(imagePath){
            addHero(imagePath.indexOf('/assets/')===0 ? base + imagePath : imagePath);
          }
        })
        .catch(function(){
          if(imagePath) addHero(imagePath.indexOf('/assets/')===0 ? base + imagePath : imagePath);
        });
    }else if(imagePath){
      addHero(imagePath.indexOf('/assets/')===0 ? base + imagePath : imagePath);
    }

    /* 移除「相關影片」之前的多餘 iframe（避免 layout 殘留） */
    (function dropIframesBeforeRelated(){
      var marker = Array.from(main.querySelectorAll('*'))
                        .find(function(el){ return /相關影片/.test((el.textContent||'').trim()); });
      if(!marker) return;
      Array.from(main.querySelectorAll('iframe')).forEach(function(f){
        if(marker.compareDocumentPosition(f) & Node.DOCUMENT_POSITION_PRECEDING){
          f.remove();
        }
      });
      // 同源重複 src 保留第一個
      var seen = {};
      Array.from(main.querySelectorAll('iframe')).forEach(function(f){
        var s = f.src || '';
        if(seen[s]) f.remove(); else seen[s] = true;
      });
    })();

    /* 文字/連結 YouTube → 16:9 iframe */
    function toIframe(url){
      try{
        // 全形：：／ → 半形
        url = url.replace(/\uFF1A/g,':').replace(/\uFF0F/g,'/');
        var u=new URL(url, location.origin), id='';
        if(u.hostname.indexOf('youtu.be')>=0){ id=u.pathname.replace(/^\//,''); }
        else { id=u.searchParams.get('v')||''; }
        if(!id) return null;
        var box=document.createElement('div'); box.className='wc-video';
        var ifr=document.createElement('iframe');
        ifr.src='https://www.youtube.com/embed/'+id;
        ifr.allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        ifr.allowFullscreen=true;
        box.appendChild(ifr);
        return box;
      }catch(e){return null;}
    }

    // A. <a href="..."> 直接換
    main.querySelectorAll('a[href*="youtube.com/watch"],a[href*="youtu.be/"]').forEach(function(a){
      if(a.closest('.wc-video,iframe')) return;
      var para = a.closest('p');
      var box = toIframe(a.href);
      if(!box) return;
      if(para && para.childNodes.length===1){ para.replaceWith(box); }
      else { a.replaceWith(box); }
    });

    // B. <p> 或 <li> 的純文字 URL
    Array.from(main.querySelectorAll('p,li')).forEach(function(el){
      if(el.querySelector('a,iframe')) return;
      var t=(el.textContent||'').trim().replace(/\uFF1A/g,':').replace(/\uFF0F/g,'/');
      var m=t.match(/https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?[^ \n\r<]+|youtu\.be\/[A-Za-z0-9_-]+)/i);
      if(!m) return;
      var box = toIframe(m[0]);
      if(box) el.replaceWith(box);
    });

    // C. **Fallback**：任何地方的「單獨一行純文字 URL」文字節點
    (function convertLooseTextUrls(){
      var it=document.createTreeWalker(main, NodeFilter.SHOW_TEXT, null);
      var nodes=[];
      while(it.nextNode()){
        var n=it.currentNode;
        if(!n.nodeValue) continue;
        var s=n.nodeValue.trim();
        if(!s) continue;
        // 避免 code/pre/a/iframe/已轉換容器
        if(n.parentElement && n.parentElement.closest('.wc-video,iframe,a,code,pre')) continue;
        s=s.replace(/\uFF1A/g,':').replace(/\uFF0F/g,'/');
        var m=s.match(/https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?[^ \t<]+|youtu\.be\/[A-Za-z0-9_-]+)/i);
        if(m && s===m[0]) nodes.push(n);
      }
      nodes.forEach(function(n){
        var url=n.nodeValue.trim().replace(/\uFF1A/g,':').replace(/\uFF0F/g,'/');
        var box=toIframe(url);
        if(box){ n.parentNode.replaceChild(box, n); }
      });
    })();
  })();
  </script>
</body>
</html>
