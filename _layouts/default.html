<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  {%- if site.description %}<meta name="description" content="{{ site.description }}">{% endif -%}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <style>
    /* YouTube 16:9 響應式容器 */
    .video-embed { position: relative; width: 100%; padding-top: 56.25%; margin: 1rem 0; border-radius: 12px; overflow: hidden; }
    .video-embed iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    /* 文章內容區常見寬度控制，可之後再微調 */
    .post-content { max-width: 760px; margin: 0 auto; line-height: 1.8; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}">{{ site.title | default: "蚯蚓貓的資工人生" }}</a></h1>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.author | default: site.title }}</p>
  </footer>

  <script>
    // 將文章內容中的 YouTube 連結（a 標籤）轉成 16:9 iframe
    (function () {
      function toEmbedUrl(href) {
        try {
          var u = new URL(href);
          if (u.hostname.includes('youtu.be')) {
            // https://youtu.be/VIDEO_ID
            return 'https://www.youtube.com/embed/' + u.pathname.slice(1);
          }
          if (u.hostname.includes('youtube.com')) {
            // https://www.youtube.com/watch?v=VIDEO_ID
            var v = u.searchParams.get('v');
            if (v) return 'https://www.youtube.com/embed/' + v;
            // https://www.youtube.com/shorts/VIDEO_ID
            if (u.pathname.startsWith('/shorts/')) {
              return 'https://www.youtube.com/embed/' + u.pathname.split('/')[2];
            }
          }
        } catch (e) {}
        return null;
      }

      var roots = document.querySelectorAll('.post-content, article, main');
      roots.forEach(function(root){
        var links = root.querySelectorAll('a[href*="youtu.be"], a[href*="youtube.com/watch"], a[href*="youtube.com/shorts"]');
        links.forEach(function(a){
          var embed = toEmbedUrl(a.getAttribute('href'));
          if (!embed) return;
          var wrap = document.createElement('div');
          wrap.className = 'video-embed';
          var iframe = document.createElement('iframe');
          iframe.setAttribute('src', embed);
          iframe.setAttribute('allowfullscreen', '');
          iframe.setAttribute('title', 'YouTube video');
          wrap.appendChild(iframe);
          // 若 a 只有純網址文字，就直接替換；若 a 在段落中，仍安全替換
          a.replaceWith(wrap);
        });
      });
    })();
  </script>
</body>
</html>
