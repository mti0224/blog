<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">
</head>
<body>

  <!-- Header -->
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-brand">
        <h1 class="wc-site-title"><a href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a></h1>
        <p class="wc-site-subtitle">Line Rangers 角色介紹與遊戲筆記</p>
      </div>
      <nav class="wc-nav" aria-label="Primary">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
          <img class="wc-ico-img" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="YouTube">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <img class="wc-ico-img" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="Instagram">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener" aria-label="Discord" title="Discord">
          <img class="wc-ico-img" src="{{ '/assets/icon/discord.png' | relative_url }}" alt="Discord">
        </a>
      </nav>
    </div>
  </header>

  <!-- 主要內容 -->
  <main class="wc-main">
    <article id="post-content" class="wc-prose">
      {{ content }}
    </article>
  </main>

  <!-- JS（以 RAW 包起來，避免 Liquid 干擾） -->
  {% raw %}
  <script>
    (function () {
      // 在前端決定首頁：避免在 Liquid 內做複雜條件
      try {
        var p = location.pathname.replace(/index\.html$/,'');
        if (p === '/' || p === '/blog/' || p === '{{ site.baseurl }}/') {
          document.body.classList.add('is-home');
        }
      } catch (e) {}

      var wrap = document.getElementById('post-content');
      if (!wrap) return;

      // A) 剔除混入內容的 front-matter 區塊（--- layout: post ... ---）
      try {
        var html = wrap.innerHTML;
        var start = html.search(/---\s*layout\s*:\s*post/i);
        if (start < 0) start = html.search(/layout\s*:\s*post/i);
        if (start >= 0) {
          var cutStart = html.lastIndexOf('---', start);
          if (cutStart < 0) cutStart = start;
          var cutEnd = html.indexOf('---', start + 3);
          if (cutEnd > cutStart) html = html.slice(0, cutStart) + html.slice(cutEnd + 3);
          wrap.innerHTML = html;
        }
      } catch (e) {}

      // B) 移除文章內「回首頁/站名」連結（只清內容區）
      try {
        var siteName = '蚯蚓貓的資工人生';
        var homeUrls = ['/', '/blog/', location.origin + '/', location.origin + '/blog/'];
        [].forEach.call(wrap.querySelectorAll('a'), function(a){
          var txt = (a.textContent || '').trim();
          var href = (a.getAttribute('href') || '').trim();
          if (homeUrls.indexOf(href) >= 0 || txt === siteName) {
            if (a.parentElement && a.parentElement.tagName === 'P' && a.parentElement.children.length === 1) {
              a.parentElement.style.display = 'none';
            } else { a.style.display = 'none'; }
          }
        });
      } catch (e) {}

      // C) 清除常見 WP 雜訊鍵
      try {
        var noise = [
          /^_oembed_/i, /^firehose_sent:/i, /^timeline_notification:/i,
          /^_publicize_job_id:/i, /^_publicize_shares:/i,
          /^_elasticsearch_data_sharing_indexed_on:/i, /^permalink:/i
        ];
        [].forEach.call(wrap.querySelectorAll('p'), function(p){
          var t = (p.textContent || '').trim();
          if (noise.some(function(rx){ return rx.test(t); })) p.style.display = 'none';
        });
      } catch (e) {}

      // D) 「下表是為各種減礦時的礦物量」下一個表格/圖片縮為 40%
      try {
        var keys = ['下表是為各種減礦時的礦物量','下表為各種減礦時的礦物量'];
        var paras = wrap.querySelectorAll('p');
        for (var i = 0; i < paras.length; i++) {
          var t = (paras[i].innerText || '').trim();
          if (keys.some(function(k){ return t.indexOf(k) === 0; })) {
            var sib = paras[i].nextElementSibling, inner = sib;
            if (!sib) break;
            if (sib.tagName === 'FIGURE' && sib.querySelector('img')) inner = sib.querySelector('img');
            if (sib.tagName === 'P') inner = sib.querySelector('img') || sib.querySelector('table') || sib;
            if (inner) inner.classList.add('shrink-40');
            break;
          }
        }
      } catch (e) {}
    })();
  </script>
  {% endraw %}

  <script src="{{ "/assets/yt-embed.js" | relative_url }}"></script>
</body>
</html>
