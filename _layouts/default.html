<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">
</head>
<body class="{% if page.url == '/' or page.url == site.baseurl or page.url == '/blog/' %}is-home{% endif %}">

  <!-- Header（icon = 圖片版） -->
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-brand">
        <h1 class="wc-site-title"><a href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a></h1>
        <p class="wc-site-subtitle">Line Rangers 角色介紹與遊戲筆記</p>
      </div>
      <nav class="wc-nav" aria-label="Primary">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
          <img class="wc-ico-img" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="YouTube">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <img class="wc-ico-img" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="Instagram">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener" aria-label="Discord" title="Discord">
          <img class="wc-ico-img" src="{{ '/assets/icon/discord.png' | relative_url }}" alt="Discord">
        </a>
      </nav>
    </div>
  </header>

  <!-- 主要內容 -->
  <main class="wc-main">
    <article id="post-content" class="wc-prose">
      {{ content }}
    </article>
  </main>

  <!-- 修復腳本：清 front-matter、移除內文「回首頁」、縮表格 40%、解碼首頁亂碼標題 -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var wrap = document.getElementById('post-content');

      /* A) 清掉文章開頭混入的 front-matter（--- layout: post ...） */
      try {
        if (wrap) {
          var html = wrap.innerHTML;

          // 1) 若最前面就是 YAML 片段，把從開頭的 --- 一直砍到第一個內容型標籤（iframe/figure/img/h1/h2/p<strong>）
          var rx = /^\s*---[\s\S]*?(?=(<iframe|<figure|<img|<h1|<h2|<p><strong|<p>))/i;
          if (rx.test(html)) {
            html = html.replace(rx, '');
          } else {
            // 2) 有些是單段 <p> + <br> 換行：抓到以 '--- layout:' 起頭的第一個 <p> 整段移除
            html = html.replace(/<p>[\s\-]*---[\s\S]*?<\/p>/i, '');
          }
          wrap.innerHTML = html;
        }
      } catch(e){}

      /* B) 移除文章內、Header 下方的「蚯蚓貓的資工人生」連結（相對/絕對都處理） */
      try {
        if (wrap) {
          var siteName = '蚯蚓貓的資工人生';
          var homeUrls = [
            '/', '/blog/',
            location.origin + '/', location.origin + '/blog/'
          ];
          wrap.querySelectorAll('a').forEach(function(a){
            var txt = (a.textContent || '').trim();
            var href = (a.getAttribute('href') || '').trim();
            if (homeUrls.indexOf(href) >= 0 || txt === siteName) {
              // 若是單獨一行的 <p> 只包這個連結，整個 <p> 隱藏
              if (a.parentElement && a.parentElement.tagName === 'P' && a.parentElement.children.length === 1) {
                a.parentElement.style.display = 'none';
              } else {
                a.style.display = 'none';
              }
            }
          });
        }
      } catch(e){}

      /* C) 讓「下表是為各種減礦時的礦物量」下一個元素縮為 40%（表格/圖片皆可） */
      try {
        var keys = ['下表是為各種減礦時的礦物量','下表為各種減礦時的礦物量'];
        var scope = wrap || document;
        var paras = scope.querySelectorAll('p');
        var targetNext = null;
        for (var i = 0; i < paras.length; i++) {
          var t = (paras[i].innerText || '').trim();
          if (keys.some(function(k){ return t.indexOf(k) === 0; })) {
            var sib = paras[i].nextElementSibling;
            for (var step=0; step<4 && sib; step++, sib = sib.nextElementSibling) {
              if (sib.matches('figure, table, p, img')) { targetNext = sib; break; }
            }
            break;
          }
        }
        if (targetNext) {
          var inner = targetNext;
          if (targetNext.tagName === 'FIGURE' && targetNext.querySelector('img')) inner = targetNext.querySelector('img');
          if (targetNext.tagName === 'P') {
            var img = targetNext.querySelector('img');
            var tbl = targetNext.querySelector('table');
            if (img) inner = img; else if (tbl) inner = tbl;
          }
          inner.classList.add('shrink-40');
        }
      } catch(e){}

      /* D) 首頁卡片若標題是 %E8%… 編碼字串，改用 decodeURIComponent 顯示中文 */
      try {
        if (document.body.classList.contains('is-home')) {
          document.querySelectorAll('.card-title a').forEach(function(a){
            var txt = (a.textContent || '').trim();
            if (/%[0-9A-F]{2}/i.test(txt)) {
              try { a.textContent = decodeURIComponent(txt); } catch(_) {}
            }
          });
        }
      } catch(e){}
    });
  </script>

  <script src="{{ "/assets/yt-embed.js" | relative_url }}"></script>
</body>
</html>
