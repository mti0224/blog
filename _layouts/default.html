---
layout: nil
---

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">

  <style>
    .wc-main{max-width:980px;margin:0 auto;padding:0 16px}
    body.wc-home .wc-main{max-width:1200px}
    .wc-header{padding:10px 16px}
    .wc-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .wc-site-title{margin:0;font-weight:800;font-size:20px}
    .wc-nav{display:flex;gap:16px;align-items:center}
    .wc-ico{width:22px;height:22px;display:inline-block}
    .wc-article-title{font-size:clamp(28px,4vw,42px);line-height:1.2;margin:0 0 12px;font-weight:800}
    .wc-hero-figure{margin:0 0 18px}
    .wc-hero-figure img{display:block;width:100%;height:auto;border-radius:12px}
    .wc-hide{display:none!important}
  </style>
</head>

<body class="{% if page.url == '/' %}wc-home{% endif %}">
  <!-- Header -->
  <header class="wc-header">
    <div class="wc-header-inner">
      <h1 class="wc-site-title">{{ site.title }}</h1>
      <nav class="wc-nav">
        <a href="https://www.youtube.com/@WarmyCat" aria-label="YouTube"><img class="wc-ico" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt=""></a>
        <a href="https://www.instagram.com/ytmit/" aria-label="Instagram"><img class="wc-ico" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt=""></a>
        <a href="https://discord.gg/XJ8KPJcdbt" aria-label="Discord"><img class="wc-ico" src="{{ '/assets/icon/discord.png' | relative_url }}" alt=""></a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="wc-main">
    {{ content }}
  </main>

  <script>
  (function(){
    // 抽出純文字中的某個鍵
    function pick(field, text){
      const re = new RegExp(field.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\s*:\\s*([^\\n]+)");
      const m = String(text||"").match(re);
      return m ? m[1].replace(/["']/g,"").trim() : "";
    }

    // 文章頁：在內容內找到 front-matter 字樣，把標題/精選圖補到最前面
    const main = document.querySelector('.wc-main');
    if(main){
      const raw = main.textContent || "";
      const hasFrontMatter = raw.includes('---') && (raw.includes('post title:') || raw.includes('posttitle:') || raw.includes('title:'));

      if(hasFrontMatter){
        const h1Exists = main.querySelector('h1.wc-article-title');
        const firstH1 = main.querySelector('h1, .post-title');
        const title = pick('post title', raw) || pick('posttitle', raw) || pick('title', raw) || (firstH1 ? firstH1.textContent.trim() : "");
        const img  = pick('image', raw);

        // 插入標題
        if(!h1Exists && title){
          const h = document.createElement('h1');
          h.className = 'wc-article-title';
          h.textContent = title;
          main.insertBefore(h, main.firstChild);
        }
        // 插入精選大圖（若有）
        if(img){
          const fig = document.createElement('figure');
          fig.className = 'wc-hero-figure';
          const im = document.createElement('img');
          im.loading = 'eager';
          im.alt = title || '';
          // 補上 baseurl
          im.src = (img.startsWith('/assets') || img.startsWith('assets/'))
                   ? ('{{ site.baseurl }}' + (img.startsWith('/')? img : '/' + img))
                   : img;
          fig.appendChild(im);
          const insertAfter = main.querySelector('h1.wc-article-title') || main.firstChild;
          main.insertBefore(fig, insertAfter.nextSibling);
        }
      }

      // YouTube 連結（含純文字 URL）→ 16:9 iframe
      function toIframe(url){
        try{
          let u = new URL(url);
          let vid = '';
          if(u.hostname.includes('youtu.be')) vid = u.pathname.slice(1);
          else if(u.searchParams.get('v')) vid = u.searchParams.get('v');
          if(!vid) return null;
          const iframe = document.createElement('iframe');
          iframe.width = '100%';
          iframe.height = Math.round(main.clientWidth * 9 / 16);
          iframe.src = 'https://www.youtube.com/embed/' + vid;
          iframe.title = 'YouTube video';
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
          iframe.allowFullscreen = true;
          iframe.style.border = '0';
          iframe.style.display = 'block';
          iframe.style.margin = '12px 0 16px';
          return iframe;
        }catch(e){ return null; }
      }

      // a[href] 版本
      main.querySelectorAll('a[href*="youtube.com/watch"], a[href*="youtu.be/"]').forEach(a=>{
        const f = toIframe(a.href);
        if(f){ a.replaceWith(f); }
      });
      // 純文字行版本
      main.querySelectorAll('p, li').forEach(el=>{
        const t = (el.textContent||'').trim();
        if(/^https?:\/\/(www\.)?(youtube\.com|youtu\.be)\/\S+$/i.test(t)){
          const f = toIframe(t);
          if(f){ el.replaceWith(f); }
        }
      });
    }
  })();
  </script>
</body>
</html>
