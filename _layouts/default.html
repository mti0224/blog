<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">
</head>
<body class="{% if page.url == '/' or page.url == site.baseurl or page.url == '/blog/' %}is-home{% endif %}">

  <!-- Header（icon 圖片版） -->
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-brand">
        <h1 class="wc-site-title"><a href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a></h1>
        <p class="wc-site-subtitle">Line Rangers 角色介紹與遊戲筆記</p>
      </div>
      <nav class="wc-nav" aria-label="Primary">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
          <img class="wc-ico-img" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="YouTube">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <img class="wc-ico-img" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="Instagram">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener" aria-label="Discord" title="Discord">
          <img class="wc-ico-img" src="{{ '/assets/icon/discord.png' | relative_url }}" alt="Discord">
        </a>
      </nav>
    </div>
  </header>

  <!-- 主要內容 -->
  <main class="wc-main">
    <div class="wc-prose">
      {{ content }}
    </div>
  </main>

  <!-- JS：縮小指定表格為 40% + 隱藏文章內的「回首頁」字樣 -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      /* 1) 指定表格縮小為 40% */
      try {
        var keys = [
          '下表是為各種減礦時的礦物量',
          '下表為各種減礦時的礦物量'
        ];
        var container = document.querySelector('.post-content') || document.querySelector('.wc-prose') || document;
        var paras = container.querySelectorAll('p');
        var targetNext = null;

        for (var i = 0; i < paras.length; i++) {
          var t = (paras[i].textContent || '').trim();
          if (keys.some(function(k){ return t.indexOf(k) === 0; })) {
            // 找「下一個可視元素」，最多往後找 3 個兄弟節點
            var sib = paras[i].nextElementSibling;
            for (var step = 0; step < 3 && sib; step++, sib = sib.nextElementSibling) {
              if (sib.matches('figure, table, p, img')) { targetNext = sib; break; }
            }
            break;
          }
        }

        if (targetNext) {
          // 若是 figure 包 img，或 p 裡面包 img/table，抓裡面的可縮放元素
          var inner = targetNext;
          if (targetNext.tagName === 'FIGURE' && targetNext.querySelector('img')) inner = targetNext.querySelector('img');
          if (targetNext.tagName === 'P') {
            var img = targetNext.querySelector('img');
            var tbl = targetNext.querySelector('table');
            if (img) inner = img;
            else if (tbl) inner = tbl;
          }
          inner.classList.add('shrink-40');
        }
      } catch(e){ /* 靜默失敗即可 */ }

      /* 2) 移除文章內、Header 下方的「蚯蚓貓的資工人生」 */
      try {
        var siteName = '蚯蚓貓的資工人生';
        var wrap = document.querySelector('.wc-prose') || document;
        var firstH1 = wrap.querySelector('h1');
        var candidates = [];
        if (firstH1) {
          // 收集出現在第一個 H1 之前的所有連結
          var walker = document.createTreeWalker(wrap, NodeFilter.SHOW_ELEMENT, null);
          var n; while (n = walker.nextNode()) {
            if (n === firstH1) break;
            if (n.tagName === 'A') candidates.push(n);
          }
        } else {
          candidates = wrap.querySelectorAll('a');
        }

        candidates.forEach(function(a){
          var text = (a.textContent || '').trim();
          var href = (a.getAttribute('href') || '').replace(location.origin, '');
          var isHomeLink = href === '/' || href === '/blog/' || a.rel === 'home';
          if (isHomeLink || text === siteName) {
            a.style.display = 'none';
            // 若在段落中，順便把多餘換行空白壓掉
            if (a.parentElement && a.parentElement.tagName === 'P' && a.parentElement.textContent.trim() === '') {
              a.parentElement.style.display = 'none';
            }
          }
        });
      } catch(e){ /* 靜默失敗即可 */ }
    });
  </script>

  <script src="{{ "/assets/yt-embed.js" | relative_url }}"></script>
</body>
</html>
