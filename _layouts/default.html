<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">

  <style>
    .wc-main{max-width:980px;margin:0 auto;padding:0 16px}
    body.wc-home .wc-main{max-width:1200px}
    .wc-article-hero{margin:0 0 20px}
    .wc-article-title{font-size:clamp(28px,4vw,42px);line-height:1.2;margin:0 0 12px;font-weight:800}
    .wc-hero-figure{margin:0}
    .wc-hero-figure img{display:block;width:100%;height:auto;border-radius:12px}
    .wc-ico-img{width:20px;height:20px;display:inline-block;vertical-align:middle}
    .wc-header{padding:10px 16px}
    .wc-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .wc-site-title{margin:0;font-size:22px}
    .wc-site-title a{text-decoration:none}
    .wc-site-subtitle{margin:4px 0 0 0;font-size:12px;opacity:.7}
    .wc-brand{display:flex;flex-direction:column}
    .wc-nav a{margin-left:12px}
  </style>
</head>
<body data-collection="{{ page.collection | default: '' }}">
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-brand">
        <h1 class="wc-site-title"><a href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a></h1>
        <p class="wc-site-subtitle">Line Rangers 角色介紹與遊戲筆記</p>
      </div>
      <nav class="wc-nav" aria-label="Social">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener">
          <img class="wc-ico-img" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="YouTube">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener">
          <img class="wc-ico-img" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="Instagram">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener">
          <img class="wc-ico-img" src="{{ '/assets/icon/discord.png' | relative_url }}" alt="Discord">
        </a>
      </nav>
    </div>
  </header>

  <main class="wc-main">
    <article id="post-content" class="wc-prose">
      {{ content }}
    </article>
  </main>

  <script>window.__BASEURL__="{{ site.baseurl | default: '' }}";</script>

  <script>
  (function(){
    var base = window.__BASEURL__ || '';
    var wrap = document.getElementById('post-content');
    if(!wrap) return;

    function isHome(){
      try{
        var p = location.pathname.replace(/index\.html$/,'');
        return (p === '/' || /\/blog\/?$/.test(p));
      }catch(e){ return false; }
    }
    if (isHome()) document.body.classList.add('wc-home');

    var isPost = (document.body.getAttribute('data-collection') === 'posts');

    function addBase(u){
      if(!u) return '';
      if(/^https?:\/\//i.test(u)) return u;
      if(u.charAt(0) !== '/') u = '/' + u;
      return base + u;
    }
    function pick(re, src){
      var m = re.exec(src);
      return m && m[1] ? (m[1]+'').trim() : '';
    }
    function toLocalUpload(u){
      if(!u) return '';
      var m = u.match(/\/wp-content\/uploads(\/.+)$/);
      if(m) return addBase('/assets/uploads' + m[1]);
      return addBase(u);
    }
    function fetchMap(cb){
      fetch(addBase('/assets/featured-map.json'))
        .then(function(r){return r.json()})
        .then(cb).catch(function(){cb(null)});
    }

    // -------- 先把殘留的前言 / 雜訊從畫面上清掉（不論是否在 <p> 裡） --------
    (function cleanFrontMatter(){
      // 1) 移除整段 YAML-like 區塊：--- layout: ... ---
      wrap.innerHTML = wrap.innerHTML.replace(/(^|\n|\r)\s*---\s*layout:[\s\S]*?---/i, '$1');

      // 2) 隱藏常見雜訊行（不一定在 <p> 裡）
      var noiseRe = /^(?:layout:|type:|status:|password:|categories:|tags:|meta:|_thumbnail_id:|_oembed_|firehose_sent:|timeline_notification:|_publicize_job_id:|_publicize_shares:|_elasticsearch_data_sharing_indexed_on:|permalink:|display_name:|image:\s|post title:|posttitle:)/i;

      Array.prototype.slice.call(wrap.childNodes).forEach(function(n){
        if(n.nodeType === 3){ // 純文字
          var t = (n.nodeValue||'').trim();
          if(noiseRe.test(t) || t === '---') n.parentNode.removeChild(n);
        }else if(n.nodeType === 1){
          var txt = (n.innerText||'').trim();
          if(noiseRe.test(txt) || txt === '---') n.style.display='none';
        }
      });
    })();

    // 重新抓一次內容（清理後）
    var raw = wrap.innerHTML;

    // 標題：post title -> posttitle -> title -> page.title
    var metaTitle =
      pick(/post title:\s*["']?([^"\n\r']+)["']?/i, raw) ||
      pick(/posttitle:\s*["']?([^"\n\r']+)["']?/i, raw) ||
      pick(/title:\s*["']?([^"\n\r']+)["']?/i, raw) || '';
    var pageTitle = "{{ page.title | escape }}";
    var finalTitle = metaTitle || pageTitle;

    // 精選圖：_thumbnail_id（優先） -> image:
    var thumbId = pick(/_thumbnail_id:\s*["']?(\d+)["']?/i, raw);
    var featuredLine = pick(/image:\s*["']?([^\s"'<>]+?\.(?:png|jpe?g|webp|gif))["']?/i, raw);

    // -------- 文章頁才插入 Hero --------
    if (isPost && (finalTitle || thumbId || featuredLine)){
      var hero = document.createElement('section');
      hero.className = 'wc-article-hero';

      if(finalTitle){
        var h = document.createElement('h1');
        h.className = 'wc-article-title';
        h.textContent = finalTitle;
        hero.appendChild(h);
      }
      var fig = document.createElement('figure');
      fig.className = 'wc-hero-figure';
      hero.appendChild(fig);

      wrap.insertBefore(hero, wrap.firstChild);

      function put(src){
        if(!src) return;
        if(fig.querySelector('img')) return;
        var img = document.createElement('img');
        img.src = src;
        img.alt = finalTitle || '';
        fig.appendChild(img);
      }

      if (thumbId){
        fetchMap(function(map){
          if(map && map[thumbId]) put(addBase(map[thumbId]));
          else if (featuredLine) put(toLocalUpload(featuredLine));
        });
      }else if (featuredLine){
        put(toLocalUpload(featuredLine));
      }
    }

    // -------- 首頁卡片縮圖：沒有 <img> 也能建立再替換 --------
    if (isHome()){
      var cards = Array.prototype.slice.call(document.querySelectorAll('.card[data-thumb-id]'));
      var need = cards.filter(function(c){ return c.getAttribute('data-thumb-id'); });
      if (need.length){
        fetchMap(function(map){
          if(!map) return;
          need.forEach(function(c){
            var id = c.getAttribute('data-thumb-id');
            var local = map[id];
            if(local){
              var a = c.querySelector('.card-thumb');
              var img = a.querySelector('img');
              if(!img){
                img = new Image();
                img.alt = (c.querySelector('.card-title')||{}).textContent || '';
                a.innerHTML = '';
                a.appendChild(img);
              }
              img.src = addBase(local);
            }
          });
        });
      }
    }
  })();
  </script>
</body>
</html>
