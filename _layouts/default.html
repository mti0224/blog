<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">

  <style>
    /* 主欄置中與寬度 */
    .wc-main{max-width:980px;margin:0 auto;padding:0 16px}
    /* 首頁拉寬 */
    body.wc-home .wc-main{max-width:1200px}

    /* 文章頁 Hero 標題與精選圖 */
    .wc-article-hero{margin:0 0 20px}
    .wc-article-title{font-size:clamp(28px,4vw,42px);line-height:1.2;margin:0 0 12px;font-weight:800}
    .wc-hero-figure{margin:0}
    .wc-hero-figure img{display:block;width:100%;height:auto;border-radius:12px}

    /* Header 社群 icon 圖片 */
    .wc-ico-img{width:20px;height:20px;display:inline-block;vertical-align:middle}
    .wc-header{padding:10px 16px}
    .wc-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .wc-site-title{margin:0;font-size:22px}
    .wc-site-title a{text-decoration:none}
    .wc-site-subtitle{margin:4px 0 0 0;font-size:12px;opacity:.7}
    .wc-brand{display:flex;flex-direction:column}
    .wc-nav a{margin-left:12px}
  </style>
</head>
<body>
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-brand">
        <h1 class="wc-site-title"><a href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a></h1>
        <p class="wc-site-subtitle">Line Rangers 角色介紹與遊戲筆記</p>
      </div>
      <nav class="wc-nav" aria-label="Social">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener">
          <img class="wc-ico-img" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="YouTube">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener">
          <img class="wc-ico-img" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="Instagram">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener">
          <img class="wc-ico-img" src="{{ '/assets/icon/discord.png' | relative_url }}" alt="Discord">
        </a>
      </nav>
    </div>
  </header>

  <main class="wc-main">
    <article id="post-content" class="wc-prose">
      {{ content }}
    </article>
  </main>

  <!-- 提供 baseurl 給前端 JS 使用 -->
  <script>window.__BASEURL__="{{ site.baseurl | default: '' }}";</script>

  <script>
  (function(){
    var base = window.__BASEURL__ || '';

    // 粗略判斷是否為首頁（/ 或 /blog/）
    try{
      var p = location.pathname.replace(/index\.html$/,'');
      if (p === '/' || /\/blog\/?$/.test(p)) document.body.classList.add('wc-home');
    }catch(e){}

    var wrap = document.getElementById('post-content');
    if (!wrap) return;

    function addBase(u){
      if(!u) return '';
      if(/^https?:\/\//i.test(u)) return u;
      if(u.charAt(0) !== '/') u = '/' + u;
      return base + u;
    }

    // 解析 front-matter 殘留的文字欄位
    function pick(re, src){
      var m = re.exec(src);
      return m && m[1] ? (m[1]+'').trim() : '';
    }

    // 把 WordPress 的 /wp-content/uploads/... 轉成站內 /assets/uploads/...
    function toLocalUpload(u){
      if(!u) return '';
      var m = u.match(/\/wp-content\/uploads(\/.+)$/);
      if(m) return addBase('/assets/uploads' + m[1]);
      return addBase(u);
    }

    // 讀取 featured-map.json
    function fetchMap(cb){
      var url = addBase('/assets/featured-map.json');
      fetch(url).then(function(r){return r.json()}).then(cb).catch(function(){cb(null)});
    }

    // 從原始 HTML 擷取 meta
    var rawHTML = wrap.innerHTML;
    var metaTitle =
      pick(/posttitle:\s*["']?([^"\n\r']+)["']?/i, rawHTML) ||
      pick(/title:\s*["']?([^"\n\r']+)["']?/i, rawHTML) || '';
    var featuredLine = pick(/image:\s*["']?([^\s"'<>]+?\.(?:png|jpe?g|webp|gif))["']?/i, rawHTML);
    var thumbId = pick(/_thumbnail_id:\s*["']?(\d+)["']?/i, rawHTML);

    // 清除顯示在文章內的 metadata 噪音段落（但保留媒體）
    try{
      var noise=/(^|\s)(_oembed_[^\n<]+|firehose_sent:[^\n<]+|timeline_notification:[^\n<]+|_publicize_job_id:[^\n<]+|_publicize_shares:[^\n<]+|_elasticsearch_data_sharing_indexed_on:[^\n<]+|permalink:[^\n<]+)/gi;
      Array.prototype.forEach.call(wrap.querySelectorAll('p'),function(p){
        var media=p.querySelector('img,iframe,video');
        var t=(p.textContent||'').trim();
        if(!t) return;
        if(media){ p.innerHTML=p.innerHTML.replace(noise,''); }
        else if(/_oembed_|firehose_sent:|timeline_notification:|_publicize_job_id:|_publicize_shares:|_elasticsearch_data_sharing_indexed_on:|^permalink:/i.test(t)){
          p.style.display='none';
        }
      });
    }catch(e){}

    // 文章頁：插入 Hero（標題＋精選圖）
    (function(){
      // 盡量用 page.title；若無則用 metaTitle
      var pageTitle = "{{ page.title | escape }}".trim();
      var finalTitle = pageTitle || metaTitle;

      // 有標題或有精選圖訊息才建立 hero
      if(!finalTitle && !featuredLine && !thumbId) return;

      var hero = document.createElement('section');
      hero.className = 'wc-article-hero';
      if(finalTitle){
        var h = document.createElement('h1');
        h.className = 'wc-article-title';
        h.textContent = finalTitle;
        hero.appendChild(h);
      }
      var fig = document.createElement('figure');
      fig.className = 'wc-hero-figure';
      hero.appendChild(fig);

      // 插在文章最前面
      wrap.insertBefore(hero, wrap.firstChild);

      // 1) 若 front-matter 有 image:，直接用（也會轉為 /assets/uploads）
      if (featuredLine){
        var img = document.createElement('img');
        img.src = toLocalUpload(featuredLine);
        img.alt = finalTitle || '';
        fig.appendChild(img);
        return;
      }
      // 2) 否則用 _thumbnail_id 去對照表
      if (thumbId){
        fetchMap(function(map){
          if(!map) return;
          var local = map[thumbId];
          if(!local) return;
          // 避免重覆插入
          if(!fig.querySelector('img')){
            var img = document.createElement('img');
            img.src = addBase(local);
            img.alt = finalTitle || '';
            fig.appendChild(img);
          }
        });
      }
    })();

    // 首頁卡片縮圖：用 data-thumb-id → 對照表換成精選圖
    if (document.body.classList.contains('wc-home')){
      var cards = Array.prototype.slice.call(document.querySelectorAll('.card[data-thumb-id]'));
      var need = cards.filter(function(c){ return c.getAttribute('data-thumb-id'); });
      if (need.length){
        fetchMap(function(map){
          if(!map) return;
          need.forEach(function(c){
            var id = c.getAttribute('data-thumb-id');
            var local = map[id];
            if(local){
              var img = c.querySelector('.card-thumb img');
              if(img) img.src = addBase(local);
            }
          });
        });
      }
    }
  })();
  </script>
</body>
</html>
