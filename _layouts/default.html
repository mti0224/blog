<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">
</head>
<body>

  <!-- Header -->
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-brand">
        <h1 class="wc-site-title"><a href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a></h1>
        <p class="wc-site-subtitle">Line Rangers 角色介紹與遊戲筆記</p>
      </div>
      <nav class="wc-nav" aria-label="Primary">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
          <img class="wc-ico-img" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="YouTube">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <img class="wc-ico-img" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="Instagram">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener" aria-label="Discord" title="Discord">
          <img class="wc-ico-img" src="{{ '/assets/icon/discord.png' | relative_url }}" alt="Discord">
        </a>
      </nav>
    </div>
  </header>

  <!-- 內容 -->
  <main class="wc-main">
    <article id="post-content" class="wc-prose">
      {{ content }}
    </article>
  </main>

  <!-- 把 baseurl 傳給 JS（這段不要包 raw） -->
  <script>
    window.__BASEURL__ = "{{ site.baseurl | default: '' }}"; // 例如 "/blog"
  </script>

  <!-- 其餘 JS 包 raw，避免 Liquid 解析 -->
  {% raw %}
  <script>
  (function () {
    // A) 前端判斷首頁（給首頁格線樣式）
    try {
      var p = location.pathname.replace(/index\.html$/,'');
      if (p === '/' || p.endsWith('/blog/')) document.body.classList.add('is-home');
    } catch (e) {}

    var wrap = document.getElementById('post-content');
    if (!wrap) return;

    // B) 剔除混入的 front-matter 區塊（--- layout: post ... ---）
    try {
      var html = wrap.innerHTML;
      var start = html.search(/---\s*layout\s*:\s*post/i);
      if (start < 0) start = html.search(/layout\s*:\s*post/i);
      if (start >= 0) {
        var cutStart = html.lastIndexOf('---', start);
        if (cutStart < 0) cutStart = start;
        var cutEnd = html.indexOf('---', start + 3);
        if (cutEnd > cutStart) html = html.slice(0, cutStart) + html.slice(cutEnd + 3);
        wrap.innerHTML = html;
      }
    } catch (e) {}

    // C) 清常見 WP 雜訊：有媒體就「只清字、不隱藏」
    try {
      var noiseLine = /(^|\s)(_oembed_[^\n<]+|firehose_sent:[^\n<]+|timeline_notification:[^\n<]+|_publicize_job_id:[^\n<]+|_publicize_shares:[^\n<]+|_elasticsearch_data_sharing_indexed_on:[^\n<]+|permalink:[^\n<]+)/gi;
      Array.prototype.forEach.call(wrap.querySelectorAll('p'), function(p){
        var hasMedia = p.querySelector('img,iframe,video');
        var t = (p.textContent || '').trim();
        if (!t) return;
        if (hasMedia) {
          p.innerHTML = p.innerHTML.replace(noiseLine, '');
        } else if (/_oembed_|firehose_sent:|timeline_notification:|_publicize_job_id:|_publicize_shares:|_elasticsearch_data_sharing_indexed_on:|^permalink:/i.test(t)) {
          p.style.display = 'none';
        }
      });
    } catch (e) {}

    // D) 文章文首自動插入「精選圖片」（來源：內文中的 image: 路徑），若尚未有圖
    try {
      var hasTopImg = !!wrap.querySelector('img');
      if (!hasTopImg) {
        // 從純文字中找 image: /path.png 或 image: "..."
        var text = wrap.textContent || '';
        var m = text.match(/image:\s*["']?([^\s"'<>]+?\.(?:png|jpe?g|webp|gif))["']?/i);
        if (m && m[1]) {
          var src = m[1];
          // 補上 baseurl（若需要）
          if (!/^https?:\/\//i.test(src)) {
            if (src.charAt(0) !== '/') src = '/' + src;
            if (window.__BASEURL__ && src.indexOf(window.__BASEURL__ + '/') !== 0) {
              src = window.__BASEURL__ + src;
            }
          }
          var fig = document.createElement('figure');
          var img = document.createElement('img');
          img.src = src;
          img.alt = '';
          img.style.display = 'block';
          img.style.width = '100%';
          img.style.height = 'auto';
          img.style.borderRadius = '12px';
          fig.style.margin = '0 0 1.25rem 0';
          fig.appendChild(img);
          wrap.insertBefore(fig, wrap.firstChild);
        }
      }
    } catch (e) {}

    // E) 「下表是為各種減礦時的礦物量」→ 下一個元素縮 40%
    try {
      var keys = ['下表是為各種減礦時的礦物量','下表為各種減礦時的礦物量'];
      var paras = wrap.querySelectorAll('p');
      for (var i = 0; i < paras.length; i++) {
        var t = (paras[i].innerText || '').trim();
        if (keys.some(function(k){ return t.indexOf(k) === 0; })) {
          var sib = paras[i].nextElementSibling, inner = sib;
          if (!sib) break;
          if (sib.tagName === 'FIGURE' && sib.querySelector('img')) inner = sib.querySelector('img');
          if (sib.tagName === 'P') inner = sib.querySelector('img') || sib.querySelector('table') || sib;
          if (inner) inner.classList.add('shrink-40');
          break;
        }
      }
    } catch (e) {}
  })();
  </script>
  {% endraw %}

  <script src="{{ "/assets/yt-embed.js" | relative_url }}"></script>
</body>
</html>
