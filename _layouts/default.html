<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">

  <style>
    /* 置中主欄並拉寬首頁 */
    .wc-main{max-width:980px;margin:0 auto;padding:0 16px}
    body.is-home .wc-main{max-width:1200px}
    /* 文章頁 Hero */
    .wc-article-hero{margin:0 0 20px 0}
    .wc-article-title{font-size:clamp(28px,4vw,42px);line-height:1.2;margin:0 0 12px;font-weight:800}
    .wc-hero-figure{margin:0}
    .wc-hero-figure img{display:block;width:100%;height:auto;border-radius:12px}
  </style>
</head>
<body>
  <header class="wc-header">
    <div class="wc-header-inner">
      <div class="wc-brand">
        <h1 class="wc-site-title"><a href="{{ "/" | relative_url }}">蚯蚓貓的資工人生</a></h1>
        <p class="wc-site-subtitle">Line Rangers 角色介紹與遊戲筆記</p>
      </div>
      <nav class="wc-nav" aria-label="Primary">
        <a href="https://www.youtube.com/@WarmyCat" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
          <img class="wc-ico-img" src="{{ '/assets/icon/youtube.png' | relative_url }}" alt="YouTube">
        </a>
        <a href="https://www.instagram.com/ytmit/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <img class="wc-ico-img" src="{{ '/assets/icon/instagram.png' | relative_url }}" alt="Instagram">
        </a>
        <a href="https://discord.gg/XJ8KPJcdbt" target="_blank" rel="noopener" aria-label="Discord" title="Discord">
          <img class="wc-ico-img" src="{{ '/assets/icon/discord.png' | relative_url }}" alt="Discord">
        </a>
      </nav>
    </div>
  </header>

  <main class="wc-main">
    <article id="post-content" class="wc-prose">
      {{ content }}
    </article>
  </main>

  <!-- 提供 baseurl 給 JS -->
  <script>window.__BASEURL__="{{ site.baseurl | default: '' }}";</script>

  {% raw %}
  <script>
  (function(){
    // 判斷首頁（控制寬度樣式）
    try {
      var p = location.pathname.replace(/index\.html$/,'');
      if (p === '/' || p.endsWith('/blog/')) document.body.classList.add('is-home');
    } catch(e){}

    var wrap = document.getElementById('post-content');
    if(!wrap) return;

    // 工具
    function addBase(u){
      if(!u) return '';
      if(/^https?:\/\//i.test(u)) return u;
      if(u.charAt(0)!=='/') u='/'+u;
      return (window.__BASEURL__||'')+u;
    }
    function fixUploadToLocal(u){
      if(!u) return '';
      var m = u.match(/\/wp-content\/uploads(\/.+)$/);
      if(m) return addBase('/assets/uploads'+m[1]);
      return addBase(u);
    }
    function fetchMap(cb){
      var url = addBase('/assets/featured-map.json');
      fetch(url).then(r=>r.json()).then(cb).catch(function(){cb(null)});
    }
    function pick(re, src){
      var m = re.exec(src);
      return m && m[1] ? (m[1]+'').trim() : '';
    }

    // 先用原始 HTML 解析 metadata（避免清理過就抓不到）
    var rawHTML = wrap.innerHTML;
    var metaTitle =
      pick(/posttitle:\s*["']?([^"\n\r']+)["']?/i, rawHTML) ||
      pick(/title:\s*["']?([^"\n\r']+)["']?/i, rawHTML) || '';
    var featuredLine = pick(/image:\s*["']?([^\s"'<>]+?\.(?:png|jpe?g|webp|gif))["']?/i, rawHTML);
    var thumbId = pick(/_thumbnail_id:\s*["']?(\d+)["']?/i, rawHTML);

    // 清掉混入的 front-matter 區塊
    try{
      var html = wrap.innerHTML;
      var s = html.search(/---\s*layout\s*:\s*post/i);
      if(s<0) s = html.search(/layout\s*:\s*post/i);
      if(s>=0){
        var a = html.lastIndexOf('---', s); if(a<0) a=s;
        var b = html.indexOf('---', s+3);
        if(b>a) html = html.slice(0,a)+html.slice(b+3);
        wrap.innerHTML = html;
      }
    }catch(e){}

    // 清雜訊（含媒體只清字、不隱藏）
    try{
      var noise=/(^|\s)(_oembed_[^\n<]+|firehose_sent:[^\n<]+|timeline_notification:[^\n<]+|_publicize_job_id:[^\n<]+|_publicize_shares:[^\n<]+|_elasticsearch_data_sharing_indexed_on:[^\n<]+|permalink:[^\n<]+)/gi;
      [].forEach.call(wrap.querySelectorAll('p'),function(p){
        var media=p.querySelector('img,iframe,video');
        var t=(p.textContent||'').trim();
        if(!t) return;
        if(media){ p.innerHTML=p.innerHTML.replace(noise,''); }
        else if(/_oembed_|firehose_sent:|timeline_notification:|_publicize_job_id:|_publicize_shares:|_elasticsearch_data_sharing_indexed_on:|^permalink:/i.test(t)){
          p.style.display='none';
        }
      });
    }catch(e){}

    // 文章頁：文首插入 Hero（標題 + 精選圖）
    (function(){
      // 若沒拿到，再退到第一個 H1
      if(!metaTitle){
        var h1=wrap.querySelector('h1');
        if(h1) metaTitle=(h1.textContent||'').trim();
      }
      // 先建立 hero（有任一就建立）
      if(metaTitle || featuredLine || thumbId){
        var hero=document.createElement('section');
        hero.className='wc-article-hero';
        if(metaTitle){
          var h=document.createElement('h1');
          h.className='wc-article-title';
          h.textContent=metaTitle;
          hero.appendChild(h);
        }
        var fig=document.createElement('figure');
        fig.className='wc-hero-figure';
        hero.appendChild(fig);
        wrap.insertBefore(hero, wrap.firstChild);

        // 1) 若 image: 已有 → 直接用（也會自動轉成本地 /assets/uploads）
        if(featuredLine){
          var img=document.createElement('img');
          img.src=fixUploadToLocal(featuredLine);
          img.alt=metaTitle||'';
          fig.appendChild(img);
        }
        // 2) 若沒有 image: 但有 _thumbnail_id → 查對照表
        else if(thumbId){
          fetchMap(function(map){
            if(!map) return;
            var local=map[thumbId];
            if(!local) return;
            // 若此時還沒有圖再插入
            if(!fig.querySelector('img')){
              var img=document.createElement('img');
              img.src=addBase(local);
              img.alt=metaTitle||'';
              fig.appendChild(img);
            }
          });
        }
      }
    })();

    // 特定表格縮 40%
    try{
      var keys=['下表是為各種減礦時的礦物量','下表為各種減礦時的礦物量'];
      var ps=wrap.querySelectorAll('p');
      for(var i=0;i<ps.length;i++){
        var t=(ps[i].innerText||'').trim();
        if(keys.some(function(k){return t.indexOf(k)===0;})){
          var sib=ps[i].nextElementSibling, inner=sib;
          if(!sib) break;
          if(sib.tagName==='FIGURE'&&sib.querySelector('img')) inner=sib.querySelector('img');
          if(sib.tagName==='P') inner=sib.querySelector('img')||sib.querySelector('table')||sib;
          if(inner) inner.classList.add('shrink-40');
          break;
        }
      }
    }catch(e){}

    // 首頁卡片：用 data-thumb-id → featured-map.json 替換縮圖
    if(document.body.classList.contains('is-home')){
      var cards=[].slice.call(document.querySelectorAll('.card[data-thumb-id]'));
      var need=cards.filter(function(c){return c.getAttribute('data-thumb-id');});
      if(need.length){
        fetchMap(function(map){
          if(!map) return;
          need.forEach(function(c){
            var id=c.getAttribute('data-thumb-id');
            var local=map[id];
            if(local){
              var img=c.querySelector('.card-thumb img');
              if(img) img.src=addBase(local);
            }
          });
        });
      }
    }
  })();
  </script>
  {% endraw %}

  <script src="{{ "/assets/yt-embed.js" | relative_url }}"></script>
</body>
</html>
