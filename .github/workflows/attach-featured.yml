name: Attach WordPress featured images to posts (HTML/MD)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - "import/*.xml"
      - "_posts/**"

permissions:
  contents: write

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Ensure folders
        run: mkdir -p _posts assets/uploads scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install parser deps
        run: |
          npm init -y >/dev/null 2>&1
          npm i xml2js@0.6.2 >/dev/null

      - name: Write script (attach_featured.js)
        shell: bash
        run: |
          cat > scripts/attach_featured.js <<'JS'
          const fs = require('fs');
          const path = require('path');
          const { parseStringPromise } = require('xml2js');

          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e => {
                const p = path.join(dir, e.name);
                return e.isDirectory() ? walk(p) : [p];
              });
          }
          const stripQuery = u => u.replace(/\?[^#]*$/,'');
          const normTitle = s => (s||'').toString()
            .replace(/&amp;/g,'&').replace(/\s+/g,'')
            .replace(/[，。、！!？?\-_:：~～'"（）()[\]]/g,'').toLowerCase();

          // --- read/patch YAML front-matter in either .md or .html ---
          function readFM(s){
            if (!s.startsWith('---')) return null;
            const end = s.indexOf('\n---',3);
            if (end < 0) return null;
            return {head:s.slice(0,end+4), body:s.slice(end+4)};
          }
          function setFMField(s, key, val){
            const fm = readFM(s);
            if (!fm) return s;
            const re = new RegExp(`\\n${key}\\s*:\\s*[^\\n]*\\n`, 'i');
            const line = `\n${key}: ${val}\n`;
            if (re.test(fm.head)) return fm.head.replace(re, line) + fm.body;
            return fm.head.replace(/\n---\s*$/, `\n${key}: ${val}\n---`) + fm.body;
          }
          function getFMTitle(s){
            const fm = readFM(s); if (!fm) return null;
            const m = fm.head.match(/\ntitle\s*:\s*(.*)\n/i);
            return m ? m[1].trim().replace(/^["']|["']$/g,'') : null;
          }

          async function buildMapsFromWXR(){
            const xmlFiles = walk('import').filter(f => f.endsWith('.xml'));
            if (!xmlFiles.length){
              console.log('[attach] No XML under import/.');
              return { attachById:new Map(), postKeyToThumbId:new Map() };
            }
            const attachById = new Map();       // id -> {url, relPath}
            const postKeyToThumbId = new Map(); // "YYYY-MM-DD|normTitle" -> thumbId
            for (const xf of xmlFiles){
              const xml = fs.readFileSync(xf,'utf8');
              const data = await parseStringPromise(xml, { explicitArray:true, mergeAttrs:true });
              const items = (((data||{}).rss||[])[0]?.channel||[])[0]?.item || [];
              for (const it of items){
                const type = (it['wp:post_type']||[])[0];
                const id   = (it['wp:post_id']||[])[0];
                const title= (it['title']||[])[0] || '';
                const date = ((it['wp:post_date']||[])[0] || '').slice(0,10);
                const metas= it['wp:postmeta'] || [];

                if (type === 'attachment'){
                  const url = stripQuery((it['wp:attachment_url']||[])[0] || (it['guid']||[])[0] || '');
                  let rel = null;
                  for (const m of metas){
                    const k = (m['wp:meta_key']||[])[0];
                    const v = (m['wp:meta_value']||[])[0];
                    if (k === '_wp_attached_file') rel = v; // e.g. 2025/10/name.png
                  }
                  if (!rel && url.includes('/uploads/')) rel = url.split('/uploads/')[1];
                  if (id && url) attachById.set(String(id), { url, relPath: rel });
                }

                if (type === 'post'){
                  let thumbId = null;
                  for (const m of metas){
                    const k = (m['wp:meta_key']||[])[0];
                    const v = (m['wp:meta_value']||[])[0];
                    if (k === '_thumbnail_id') thumbId = String(v);
                  }
                  if (thumbId){
                    const key = `${date}|${normTitle(title)}`;
                    postKeyToThumbId.set(key, thumbId);
                  }
                }
              }
            }
            return { attachById, postKeyToThumbId };
          }

          (async () => {
            const { attachById, postKeyToThumbId } = await buildMapsFromWXR();

            // 同時處理 .md/.markdown/.html
            const posts = walk('_posts').filter(f => /\.(md|markdown|html)$/i.test(f));
            let updated = 0, matched = 0, missing = 0;

            for (const file of posts){
              const base = path.basename(file);
              const dm = base.match(/^(\d{4}-\d{2}-\d{2})-/);
              const date = dm ? dm[1] : null;
              const s0 = fs.readFileSync(file,'utf8');
              const title = getFMTitle(s0);

              if (!date || !title){ missing++; continue; }

              const key = `${date}|${normTitle(title)}`;
              const thumbId = postKeyToThumbId.get(key);
              const att = thumbId ? attachById.get(String(thumbId)) : null;
              if (!att){ missing++; continue; }

              const rel = att.relPath
                ? `assets/uploads/${att.relPath}`
                : (att.url.includes('/uploads/') ? `assets/uploads/${att.url.split('/uploads/')[1]}` : null);
              if (!rel){ missing++; continue; }

              const imagePath = '/' + rel.replace(/%2F/gi,'/');
              const s1 = setFMField(s0, 'image', imagePath);
              if (s1 !== s0){
                fs.writeFileSync(file, s1);
                updated++;
              }
              matched++;
            }
            console.log(`[attach] matched=${matched}, updated=${updated}, missing=${missing}`);
          })().catch(e => { console.error(e); process.exit(1); });
          JS

      - name: Run script
        run: node scripts/attach_featured.js

      - name: Commit & push changes
        run: |
          if [ -n "$(git status --porcelain _posts assets/uploads)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts assets/uploads
            git commit -m "feat: add featured image to front-matter for HTML/MD posts"
            git push
          else
            echo "No changes."
          fi
