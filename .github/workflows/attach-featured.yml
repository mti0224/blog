name: Attach featured images to posts

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm i xml2js js-yaml --no-save

      - name: Attach featured images
        run: |
          node scripts/attach_by_thumbnail_id.js

      - name: Commit & push if changed
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: write featured image (image:) into posts"
            git push
          else
            echo "No changes."
          fi
