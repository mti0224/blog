# .github/workflows/import.yml
name: Import WordPress XML to Jekyll

on:
  workflow_dispatch:
    inputs:
      xml_path:
        description: 'Path to the WXR file'
        required: true
        default: import/export.xml
  push:
    paths:
      - "import/*.xml"

permissions:
  contents: write  # 讓 GITHUB_TOKEN 可以 commit

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install converter
        run: npm i -g wordpress-export-to-markdown@latest

      - name: Clean output folders
        run: rm -rf _posts assets && mkdir -p _posts assets

      - name: Convert WXR -> Markdown
        run: |
          wordpress-export-to-markdown \
            "${{ github.event.inputs.xml_path || 'import/export.xml' }}" \
            --post-folder "_posts" \
            --asset-folder "assets" \
            --download-attachments

      - name: Commit converted files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts assets
            git commit -m "chore(import): convert WordPress XML to Markdown"
            git push
          else
            echo "No changes to commit."
          fi
