name: Import WordPress WXR → Jekyll

on:
  workflow_dispatch:
    inputs:
      xml_path:
        description: 'Path to WXR (leave empty to scan import/*.xml)'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths:
      - 'import/*.xml'
      - 'import/**/*.xml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure folders
        run: |
          mkdir -p _posts assets/uploads import

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install importer gems
        run: |
          gem install jekyll-import reverse_markdown open_uri_redirections nokogiri faraday-retry --no-document

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1) 轉換 WXR → Markdown，並下載文中圖片到 assets/uploads
      - name: Convert WXR → Markdown (+ download content images)
        env:
          XML_INPUT: ${{ github.event.inputs.xml_path }}
        run: |
          set -e
          # 找要處理的 XML
          if [ -n "$XML_INPUT" ] && [ -f "$XML_INPUT" ]; then
            XMLS="$XML_INPUT"
          else
            XMLS=$(ls import/*.xml 2>/dev/null || true)
          fi
          if [ -z "$XMLS" ]; then
            echo "No XML found in import/. Upload your WXR (e.g., import/export.xml)."
            exit 1
          fi

          # 建立 Ruby 腳本並執行
          cat > import.rb <<'RUBY'
          require 'jekyll-import'
          require 'jekyll-import/importers/wordpressdotcom'
          require 'open_uri_redirections'
          src = ENV['SRC']
          abort "Missing SRC" unless src && File.exist?(src)
          puts "Importing #{src}..."
          JekyllImport::Importers::WordpressDotCom.run(
            'source'          => src,
            'assets_folder'   => 'assets/uploads',
            'no_fetch_images' => false,
            'comments'        => false
          )
          RUBY

          for X in $XMLS; do
            SRC="$X" ruby import.rb
          done

      # 2) 正規化文章內圖片 URL（去掉 query、修正 src/srcset、WP 上傳路徑→站內 assets）
      - name: Normalize image URLs in posts (strip ?w=, fix src/srcset, wp URLs)
        run: |
          node --input-type=commonjs - <<'NODE'
          const fs = require('fs'), path = require('path');
          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e=>{const p=path.join(dir,e.name);return e.isDirectory()?walk(p):[p];});
          }
          const files = walk('_posts').filter(f=>/\.(md|markdown|html)$/i.test(f));
          const qInPath = /(\.(?:png|jpe?g|gif|webp|svg))(?:\?[^)"'\s>]+)/gi;
          const srcQuery  = /(src\s*=\s*")([^"?"]+)(\?[^"]*)(")/gi;
          const srcsetQuery = /(\s)([^,\s"]+?\.(?:png|jpe?g|gif|webp|svg))(?:\?[^,\s"]+)/gi;
          const wpUploads = /https?:\/\/[^"')]+\/wp-content\/uploads/gi;
          const toAssets  = '/assets/uploads';
          let changed = 0;
          for (const f of files) {
            let s = fs.readFileSync(f,'utf8');
            const before = s;
            s = s
              .replace(qInPath,'$1')
              .replace(srcQuery,(_m,p1,p2,_q,p4)=>p1+p2+p4)
              .replace(srcsetQuery,'$1$2')
              .replace(wpUploads,toAssets)
              .replace(/&amp;/g,'&');
            if (s!==before){ fs.writeFileSync(f,s); changed++; }
          }
          console.log('Normalized files:', changed);
          NODE

      # 3) 將 assets/uploads 底下的檔名一律轉小寫，並同步更新文章引用
      - name: Lowercase assets filenames and update references
        run: |
          node --input-type=commonjs - <<'NODE'
          const fs = require('fs'), path = require('path');
          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e=>{const p=path.join(dir,e.name);return e.isDirectory()?walk(p):[p];});
          }
          const ASSET='assets/uploads';
          const POST='_posts';
          const files = walk(ASSET);
          const map = new Map();
          for (const f of files){
            const rel = path.relative('.',f).replace(/\\/g,'/');
            const dir = path.dirname(rel), base = path.basename(rel);
            const lower = base.toLowerCase();
            const cut = lower.split('?')[0].replace(/%253f.*$/,'').replace(/%3f.*$/,'');
            const target = path.join(dir,cut).replace(/\\/g,'/');
            if (rel!==target){
              if (fs.existsSync(target)) fs.rmSync(rel);
              else fs.renameSync(rel,target);
              map.set(rel,target);
            }
          }
          const posts = walk(POST).filter(f=>/\.(md|markdown|html)$/i.test(f));
          const reAsset = /\/assets\/uploads\/[^\s"'()]+/gi;
          let changed=0;
          for(const pf of posts){
            let s = fs.readFileSync(pf,'utf8');
            const before = s;
            s = s
              .replace(/(\.(?:png|jpe?g|gif|webp|svg))\?[^)"'\s>]*/gi,'$1')
              .replace(reAsset, m=>m.toLowerCase())
              .replace(/%253f[^)"'\s>]*/gi,'')
              .replace(/%3f[^)"'\s>]*/gi,'');
            if (s!==before){ fs.writeFileSync(pf,s); changed++; }
          }
          console.log('Renamed assets:', map.size, 'Updated posts:', changed);
          NODE

      # 4) 從 WXR 的 _thumbnail_id 解析出特色圖片 → 下載到 assets 並寫入 front-matter image
      - name: Install XML parser for featured images
        run: npm i xml2js --no-save

      - name: Attach featured images from WXR (image:) and download assets
        env:
          XML_INPUT: ${{ github.event.inputs.xml_path }}
        run: |
          node --input-type=commonjs - <<'NODE'
          (async () => {
            const fs = require('fs');
            const path = require('path');
            const http = require('http');
            const https = require('https');
            const { parseStringPromise } = require('xml2js');

            function walk(dir){
              if (!fs.existsSync(dir)) return [];
              return fs.readdirSync(dir,{withFileTypes:true})
                .flatMap(e => { const p = path.join(dir, e.name); return e.isDirectory()? walk(p) : [p]; });
            }
            function ensureDir(p){ fs.mkdirSync(path.dirname(p), { recursive:true }); }
            function dl(url, dest){
              return new Promise((resolve,reject)=>{
                const client = url.startsWith('https') ? https : http;
                ensureDir(dest);
                client.get(url, res=>{
                  if (res.statusCode>=300 && res.statusCode<400 && res.headers.location){
                    return dl(res.headers.location, dest).then(resolve).catch(reject);
                  }
                  if (res.statusCode!==200) return reject(new Error('HTTP '+res.statusCode+' '+url));
                  const out = fs.createWriteStream(dest);
                  res.pipe(out); out.on('finish',()=>out.close(resolve));
                }).on('error', reject);
              });
            }
            function stripQuery(u){
              return u
                .replace(/%253f[^)"'\s>]*/ig,'')
                .replace(/%3f[^)"'\s>]*/ig,'')
                .replace(/(\.(png|jpe?g|gif|webp|svg))\?[^)"'\s>]*/ig,'$1');
            }
            function toAssetsPath(abs){
              const m = abs.match(/\/wp-content\/uploads\/(.+)$/i);
              if (!m) return null;
              let rel = stripQuery(m[1]);
              try { rel = decodeURIComponent(rel); } catch {}
              rel = rel.replace(/\\/g,'/').toLowerCase();
              return path.join('assets','uploads', rel);
            }
            function readFrontMatter(s){
              if (!s.startsWith('---')) return null;
              const end = s.indexOf('\n---',3);
              if (end < 0) return null;
              return { fm: s.slice(0,end+4), body: s.slice(end+4) };
            }

            // 取得 XML 檔
            const xmlInput = process.env.XML_INPUT;
            let xmlFiles = [];
            if (xmlInput && fs.existsSync(xmlInput)) xmlFiles = [xmlInput];
            else if (fs.existsSync('import')) xmlFiles = walk('import').filter(f => f.endsWith('.xml'));
            if (xmlFiles.length === 0){ console.log('No XML found.'); return; }

            // 文章清單
            const posts = walk('_posts').filter(f => /\.(md|markdown)$/i.test(f));
            if (posts.length === 0){ console.log('No posts.'); return; }

            // 由 WXR 建立：post_id -> featured image URL
            const featuredByPostId = new Map();

            for (const xf of xmlFiles){
              const xml = fs.readFileSync(xf,'utf8');
              const data = await parseStringPromise(xml, { explicitArray:true });
              const items = (((data||{}).rss||[])[0]||{}).channel?.[0]?.item || [];

              const attachUrl = new Map(); // attachment_id -> url
              for (const it of items){
                const type = (it['wp:post_type']||[''])[0];
                if (String(type) === 'attachment'){
                  const id = Number((it['wp:post_id']||['0'])[0]);
                  const url = (it['wp:attachment_url']||[''])[0];
                  if (id && url) attachUrl.set(id, url);
                }
              }

              for (const it of items){
                const type = (it['wp:post_type']||[''])[0];
                if (String(type) !== 'post') continue;
                const pid = Number((it['wp:post_id']||['0'])[0]);
                const metas = it['wp:postmeta'] || [];
                let thumbId = null;
                for (const m of metas){
                  const k = (m['wp:meta_key']||[''])[0];
                  if (k === '_thumbnail_id'){ thumbId = Number((m['wp:meta_value']||[''])[0]); break; }
                }
                const url = thumbId ? attachUrl.get(thumbId) : null;
                if (pid && url) featuredByPostId.set(pid, url);
              }
            }

            // 將 featured image 下載並寫入 front-matter image
            let updated = 0, downloaded = 0;
            for (const file of posts){
              const s = fs.readFileSync(file,'utf8');
              const fm = readFrontMatter(s);
              if (!fm) continue;

              const idm = fm.fm.match(/\b(wordpress_id|wp_id|post_id):\s*"?(\d+)"?/i);
              const pid = idm ? Number(idm[2]) : null;
              if (!pid) continue;

              const fUrlRaw = featuredByPostId.get(pid);
              if (!fUrlRaw) continue;

              const dest = toAssetsPath(fUrlRaw);
              if (!dest) continue;

              if (!fs.existsSync(dest)){
                try { await dl(fUrlRaw, dest); downloaded++; }
                catch(e){ console.log('download failed:', fUrlRaw); }
              }

              // 已有 image 就不覆蓋
              if (/\nimage:\s*["']?[^"'\n]+["']?\s*$/m.test(fm.fm)) continue;

              const rel = '/' + dest.replace(/\\/g,'/');
              const injected = fm.fm.replace(/\n---\s*$/, `\nimage: "${rel}"\n---`);
              fs.writeFileSync(file, injected + fm.body);
              updated++;
            }

            console.log('featured mapped (updated posts):', updated, 'downloaded assets:', downloaded);
          })().catch(err => { console.error(err); process.exit(1); });
          NODE

      - name: Quick sanity check
        run: |
          echo "Posts count:" && (ls -1 _posts | wc -l || true)
          echo "Assets count:" && (find assets/uploads -type f | wc -l || true)

      - name: Commit & push imported content
        run: |
          if [ -n "$(git status --porcelain _posts assets)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts assets
            git commit -m "chore(import): WordPress WXR → Markdown + assets + featured images"
            git push
          else
            echo "No changes to commit."
          fi
