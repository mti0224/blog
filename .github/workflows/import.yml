name: Import WordPress WXR → Jekyll

on:
  workflow_dispatch:
    inputs:
      xml_path:
        description: 'Path to WXR (leave empty to scan import/*.xml)'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths:
      - 'import/*.xml'
      - 'import/**/*.xml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure folders
        run: mkdir -p _posts assets/uploads import

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install importer gems
        run: |
          gem install jekyll-import reverse_markdown open_uri_redirections nokogiri faraday-retry --no-document

      - name: Convert WXR → Markdown (+ download images)
        env:
          XML_INPUT: ${{ github.event.inputs.xml_path }}
        run: |
          set -e
          # 1) 決定要處理哪些 XML
          if [ -n "$XML_INPUT" ] && [ -f "$XML_INPUT" ]; then
            XMLS="$XML_INPUT"
          else
            XMLS=$(ls import/*.xml 2>/dev/null || true)
          fi
          if [ -z "$XMLS" ]; then
            echo "No XML found in import/. Upload your WXR (e.g., import/export.xml)."
            exit 1
          fi

          # 2) Ruby 腳本（⚠️ 正確常數名 + 需要 require open_uri_redirections）
          cat > import.rb <<'RUBY'
          require 'jekyll-import'
          require 'jekyll-import/importers/wordpressdotcom'
          require 'open_uri_redirections'
          src = ENV['SRC']
          abort "Missing SRC" unless src && File.exist?(src)
          puts "Importing #{src}..."
          JekyllImport::Importers::WordpressDotCom.run(
            'source'          => src,
            'assets_folder'   => 'assets/uploads', # 圖片下載位置
            'no_fetch_images' => false,            # 若抓圖太慢可改 true 先轉文章
            'comments'        => false
          )
          RUBY

          # 3) 逐檔執行
          for X in $XMLS; do
            SRC="$X" ruby import.rb
          done
      # 解析 WXR 取出每篇文章的 featured image，下載到 assets 並寫入 front-matter: image
      - name: Attach featured images from WXR to posts (image:) and download assets
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i xml2js
      - name: Map _thumbnail_id → attachment_url → front-matter image
        env:
          XML_INPUT: ${{ github.event.inputs.xml_path }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const https = require('https');
          const { parseStringPromise } = require('xml2js');

          // --- helpers ---
          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e => { const p = path.join(dir, e.name); return e.isDirectory()? walk(p) : [p]; });
          }
          function ensureDir(p){ fs.mkdirSync(path.dirname(p), { recursive:true }); }
          function dl(url, dest){
            return new Promise((resolve,reject)=>{
              ensureDir(dest);
              https.get(url, res=>{
                if (res.statusCode>=300 && res.statusCode<400 && res.headers.location){
                  return dl(res.headers.location, dest).then(resolve).catch(reject);
                }
                if (res.statusCode!==200) return reject(new Error('HTTP '+res.statusCode+' '+url));
                const out = fs.createWriteStream(dest);
                res.pipe(out); out.on('finish',()=>out.close(resolve));
              }).on('error', reject);
            });
          }
          function stripQuery(u){
            return u
              .replace(/%253f[^)"'\s>]*/ig,'')
              .replace(/%3f[^)"'\s>]*/ig,'')
              .replace(/(\.(png|jpe?g|gif|webp|svg))\?[^)"'\s>]*/ig,'$1');
          }
          function toAssetsPath(abs){
            // 取出 /wp-content/uploads/ 後的相對路徑
            const m = abs.match(/\/wp-content\/uploads\/(.+)$/i);
            if (!m) return null;
            let rel = stripQuery(m[1]);
            try { rel = decodeURIComponent(rel); } catch {}
            // 正規化為小寫，避免 Pages 上大小寫 404
            rel = rel.replace(/\\/g,'/').toLowerCase();
            return path.join('assets','uploads', rel);
          }
          function readFrontMatter(s){
            if (!s.startsWith('---')) return null;
            const end = s.indexOf('\n---',3);
            if (end < 0) return null;
            return { fm: s.slice(0,end+4), body: s.slice(end+4), endIdx: end };
          }

          // --- 1) 找到要處理的 XML 清單 ---
          const xmlInput = process.env.XML_INPUT;
          let xmlFiles = [];
          if (xmlInput && fs.existsSync(xmlInput)) xmlFiles = [xmlInput];
          else if (fs.existsSync('import')) xmlFiles = walk('import').filter(f => f.endsWith('.xml'));
          if (xmlFiles.length === 0){ console.log('No XML found under import/.'); process.exit(0); }

          // 文章檔
          const posts = walk('_posts').filter(f => /\.(md|markdown)$/i.test(f));
          if (posts.length === 0){ console.log('No posts in _posts/.'); process.exit(0); }

          // 用來配對 WXR 與 Jekyll 的 id/title/date
          const postMeta = posts.map(f=>{
            const s = fs.readFileSync(f,'utf8');
            const fmObj = readFrontMatter(s);
            let id=null, title=null, date=null;
            if (fmObj){
              const fm = fmObj.fm;
              const m1 = fm.match(/\b(wordpress_id|wp_id|post_id):\s*"?(\d+)"?/i); if (m1) id = Number(m1[2]);
              const m2 = fm.match(/\ntitle:\s*["']?(.+?)["']?\s*\n/i);        if (m2) title = m2[1].trim();
              const m3 = fm.match(/\ndate:\s*["']?(.+?)["']?\s*\n/i);         if (m3) date = m3[1].trim().slice(0,10);
            }
            // 從檔名取 yyyy-mm-dd
            if (!date){
              const bn = path.basename(f);
              const dm = bn.match(/^(\d{4}-\d{2}-\d{2})-/); if (dm) date = dm[1];
            }
            return { file:f, id, title, date, raw:s, fm: fmObj };
          });

          // --- 2) 從 WXR 建立：post_id -> featured attachment URL 的對照 ---
          const featuredByPostId = new Map();

          for (const xf of xmlFiles){
            const xml = fs.readFileSync(xf,'utf8');
            const data = await parseStringPromise(xml, { explicitArray:true });
            const items = (((data||{}).rss||[])[0]||{}).channel?.[0]?.item || [];

            // 附件表：attachment_id → url
            const attachUrl = new Map();
            for (const it of items){
              const type = (it['wp:post_type']||[''])[0];
              if (String(type) === 'attachment'){
                const id = Number((it['wp:post_id']||['0'])[0]);
                const url = (it['wp:attachment_url']||[''])[0];
                if (id && url) attachUrl.set(id, url);
              }
            }

            // 文章：找 _thumbnail_id，映射為 URL
            for (const it of items){
              const type = (it['wp:post_type']||[''])[0];
              if (String(type) !== 'post') continue;
              const pid = Number((it['wp:post_id']||['0'])[0]);
              const metas = it['wp:postmeta'] || [];
              let thumbId = null;
              for (const m of metas){
                const k = (m['wp:meta_key']||[''])[0];
                if (k === '_thumbnail_id'){
                  thumbId = Number((m['wp:meta_value']||[''])[0]); break;
                }
              }
              const url = thumbId ? attachUrl.get(thumbId) : null;
              if (pid && url) featuredByPostId.set(pid, url);
            }
          }

          // --- 3) 對每篇 Jekyll 文章：若有對應 featured，下載並寫 front-matter image ---
          let updated = 0, downloaded = 0;
          for (const p of postMeta){
            // 先看 id 配對
            let fUrl = p.id ? featuredByPostId.get(p.id) : null;

            // 若 id 不在 WXR（或 importer 沒寫 id），用「日期+標題」弱匹配
            if (!fUrl){
              // 在 WXR 內用 title/date 找（略，簡化：以 id 為主）
            }

            if (!fUrl) continue; // 沒有 featured

            const dest = toAssetsPath(fUrl);
            if (!dest) continue;

            // 下載（不存在才抓）
            if (!fs.existsSync(dest)){
              try { await dl(fUrl, dest); downloaded++; }
              catch(e){ console.log('download failed:', fUrl); }
            }

            // 如果文章沒有 image:，就補上
            if (!p.fm) continue;
            if (/\nimage:\s*["']?[^"'\n]+["']?\s*$/m.test(p.fm.fm)) continue;

            const rel = '/' + dest.replace(/\\/g,'/'); // 例如 /assets/uploads/2025/06/xxx.png
            const injected = p.fm.fm.replace(/\n---\s*$/, `\nimage: "${rel}"\n---`);
            const combined = injected + p.fm.body;
            fs.writeFileSync(p.file, combined);
            updated++;
          }

          console.log('featured mapped (updated posts):', updated, 'downloaded assets:', downloaded);
          NODE

      # 先清掉 ?query、修正 src/srcset、wp 上的絕對 uploads
      - name: Normalize image URLs in posts (strip ?w=, fix src/srcset, wp URLs)
        run: |
          node - <<'NODE'
          const fs = require('fs'), path = require('path');
          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e=>{const p=path.join(dir,e.name); return e.isDirectory()?walk(p):[p];});
          }
          const files = walk('_posts').filter(f => /\.(md|markdown|html)$/i.test(f));

          // 1) Markdown/一般連結：...png?xxx  -> ...png
          const qInPath = /(\.(?:png|jpe?g|gif|webp|svg))(?:\?[^)"'\s>]+)/gi;
          // 2) <img src="...?...">
          const srcQuery  = /(src\s*=\s*")([^"?"]+)(\?[^"]*)(")/gi;
          // 3) <img srcset="a.png?w=1024 1024w, b.jpg?x=1 512w">
          const srcsetQuery = /(\s)([^,\s"]+?\.(?:png|jpe?g|gif|webp|svg))(?:\?[^,\s"]+)/gi;
          // 4) 舊站完整網址 -> 相對 uploads
          const wpUploads = /https?:\/\/[^"')]+\/wp-content\/uploads/gi;
          const toAssets  = '/assets/uploads';

          let changed = 0;
          for (const f of files) {
            let s = fs.readFileSync(f, 'utf8');
            const before = s;
            s = s
              .replace(qInPath, '$1')
              .replace(srcQuery,   (_m,p1,p2,_q,p4)=>p1+p2+p4)
              .replace(srcsetQuery,'$1$2')
              .replace(wpUploads,  toAssets)
              .replace(/&amp;/g, '&'); // e.g. &amp;w=948

            if (s !== before) { fs.writeFileSync(f, s); changed++; }
          }
          console.log('Normalized files:', changed);
          NODE

      # 把 /assets/... 改成 {{ "/assets/..." | relative_url }}（解決 baseurl=/blog）
      - name: Rewrite /assets URLs to Liquid relative_url
        run: |
          node - <<'NODE'
          const fs = require('fs'), path = require('path');
          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e=>{const p=path.join(dir,e.name); return e.isDirectory()?walk(p):[p];});
          }
          const files = walk('_posts').filter(f => /\.(md|markdown|html)$/i.test(f));
          const rules = [
            // Markdown 圖片
            { re: /(!\[[^\]]*\]\()\s*(\/assets\/[^)\s]+)(\s+"[^"]*")?\)/gi,
              fn: (m,p1,p2,p3='') => `${p1}{{ "${p2}" | relative_url }}${p3})` },
            // <img src="/assets/...">
            { re: /(<img[^>]*\ssrc=)["'](\/assets\/[^"']+)["']/gi,
              fn: (m,p1,p2) => `${p1}"{{ "${p2}" | relative_url }}"` },
            // <a href="/assets/...">
            { re: /(<a[^>]*\shref=)["'](\/assets\/[^"']+)["']/gi,
              fn: (m,p1,p2) => `${p1}"{{ "${p2}" | relative_url }}"` },
          ];
          let changed = 0;
          for (const f of files) {
            const before = fs.readFileSync(f,'utf8');
            let after = before;
            for (const {re, fn} of rules) after = after.replace(re, fn);
            if (after !== before) { fs.writeFileSync(f, after); changed++; }
          }
          console.log('Rewritten files:', changed);
          NODE
      - name: Ensure each post has a front-matter `image` (first image in content)
        run: |
          node - <<'NODE'
          const fs = require('fs'), path = require('path');

          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e => {
                const p = path.join(dir, e.name);
                return e.isDirectory() ? walk(p) : [p];
              });
          }

          const posts = walk('_posts').filter(f => /\.(md|markdown)$/i.test(f));

          // 抓第一張圖：支援 Markdown 與 <img src="">
          const reMd  = /!\[[^\]]*\]\(([^)\s]+)(?:\s+"[^"]*")?\)/i;
          const reImg = /<img[^>]+src=["']([^"']+)["']/i;

          function stripQuery(u){
            // 移除 ?w=… 這類查詢參數與編碼後的 %3F/%253F
            return u
              .replace(/%253f[^)"'\s>]*/i,'')
              .replace(/%3f[^)"'\s>]*/i,'')
              .replace(/(\.(png|jpe?g|gif|webp|svg))\?[^)"'\s>]*/i,'$1');
          }

          function toAssets(u){
            // 站外 wp 上傳路徑 → 本地 assets；其餘保留
            return u
              .replace(/https?:\/\/[^"')]+\/wp-content\/uploads/i, '/assets/uploads');
          }

          for (const f of posts){
            let s = fs.readFileSync(f, 'utf8');

            // 解析 front matter
            if (!s.startsWith('---')) continue;
            const end = s.indexOf('\n---', 3);
            if (end < 0) continue;

            const fm = s.slice(0, end + 4);      // 含結尾 '---\n'
            const body = s.slice(end + 4);

            // 已有 image 就略過
            if (/\nimage:\s*["']?[^"'\n]+["']?\s*$/m.test(fm)) continue;

            // 從內文抓第一張圖
            let m = body.match(reMd) || body.match(reImg);
            if (!m) continue;

            let url = stripQuery(m[1] || '');
            url = toAssets(url);

            // 僅接受站內 /assets/uploads/... 圖；其他情況略過（避免壞連結）
            if (!/^\/assets\/uploads\//i.test(url)) continue;

            // 寫入 image 欄位到 front matter（放在最後一行前面）
            const ins = `image: "${url}"\n`;
            const updated = fm.replace(/\n---\s*$/, `\n${ins}---`) + body;
            fs.writeFileSync(f, updated);
          }
          console.log('Front-matter image ensured (where possible).');
          NODE

      - name: Quick sanity check for leftovers
        run: |
          echo "Leftover '?w=' refs (should be 0):"
          grep -R --line-number -E '\.(png|jpe?g|gif|webp|svg)\?[^\)"\s>]+' _posts || true

      - name: List generated files (debug)
        run: |
          echo "==== _posts ====" && ls -al _posts || true
          echo "==== assets/uploads count ====" && (find assets/uploads -type f | wc -l || true)

      - name: Commit & push imported content
        run: |
          if [ -n "$(git status --porcelain _posts assets)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts assets
            git commit -m "chore(import): WordPress WXR → Markdown + assets + URL fixes"
            git push
          else
            echo "No changes to commit."
          fi
