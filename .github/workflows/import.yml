name: Import WordPress WXR → Markdown

on:
  # 手動觸發（可指定 xml 路徑）
  workflow_dispatch:
    inputs:
      xml_path:
        description: Path to WXR (default: import/export.xml)
        required: false
        default: import/export.xml

  # 只要 import/ 下新增或更新 xml 就自動跑
  push:
    branches: [ main ]
    paths:
      - 'import/**/*.xml'
      - 'import/*.xml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure folders
        run: |
          mkdir -p _posts assets/uploads import

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install importer gems
        run: |
          gem install jekyll-import reverse_markdown

      - name: Convert WXR → Markdown (+ download images)
        env:
          XML_INPUT: ${{ github.event.inputs.xml_path }}
        run: |
          set -e
          echo "XML_INPUT=${XML_INPUT}"
          # 若沒有指定輸入，就抓 import/ 下所有 .xml
          if [ -z "$XML_INPUT" ] || [ "$XML_INPUT" = "import/export.xml" ] && [ ! -f "$XML_INPUT" ]; then
            echo "No explicit xml found, will scan import/ for *.xml"
            ls -al import/ || true
            XMLS=$(ls import/*.xml 2>/dev/null || true)
          else
            XMLS="$XML_INPUT"
          fi

          if [ -z "$XMLS" ]; then
            echo "No XML found in import/. Please upload your export.xml"
            exit 1
          fi

          echo "Will process: $XMLS"

          for X in $XMLS; do
            echo "Processing $X ..."
            ruby - <<'RUBY'
            require 'jekyll-import'
            src = ENV['X_FILE']
            puts "Importing #{src}"
            JekyllImport::WordPressDotCom.process({
              'source'          => src,
              'assets_folder'   => 'assets/uploads', # 下載媒體到這裡
              'no_fetch_images' => false,            # 若要跳過抓圖可改 true
              'comments'        => false
            })
            RUBY
          done
        shell: bash
        env:
          X_FILE: ${{ matrix.x }}
        strategy:
          matrix:
            x: []

      - name: List generated files (debug)
        run: |
          echo "==== _posts ===="
          ls -al _posts || true
          echo "==== assets/uploads (count) ===="
          find assets/uploads -type f | wc -l || true

      - name: Commit & push imported content
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts assets/uploads || true
          git commit -m "chore(import): convert WordPress WXR to Markdown + assets" || echo "No changes"
          git push || true
