name: Import WordPress WXR → Jekyll

on:
  workflow_dispatch:
    inputs:
      xml_path:
        description: 'Path to WXR (leave empty to scan import/*.xml)'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths:
      - 'import/*.xml'
      - 'import/**/*.xml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure folders
        run: mkdir -p _posts assets/uploads import

      # --- Convert WXR → Markdown (jekyll-import) ---
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install importer gems
        run: |
          gem install jekyll-import reverse_markdown open_uri_redirections nokogiri faraday-retry --no-document

      - name: Convert WXR → Markdown (+ download inline images)
        env:
          XML_INPUT: ${{ github.event.inputs.xml_path }}
        run: |
          set -e
          # decide source XML
          if [ -n "$XML_INPUT" ] && [ -f "$XML_INPUT" ]; then
            XMLS="$XML_INPUT"
          else
            XMLS=$(ls import/*.xml 2>/dev/null || true)
          fi
          if [ -z "$XMLS" ]; then
            echo "No XML found under import/. Upload export.xml first."
            exit 1
          fi

          cat > import.rb <<'RUBY'
          require 'jekyll-import'
          require 'jekyll-import/importers/wordpressdotcom'
          require 'open_uri_redirections'

          src = ENV['SRC']
          abort "Missing SRC" unless src && File.exist?(src)
          puts "Importing #{src}..."
          JekyllImport::Importers::WordpressDotCom.run(
            'source'          => src,
            'assets_folder'   => 'assets/uploads',
            'no_fetch_images' => false,
            'comments'        => false
          )
          RUBY

          for X in $XMLS; do
            SRC="$X" ruby import.rb
          done

      # --- Attach featured images (thumbnail) to front-matter & download files ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps for XML parsing
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i xml2js --no-audit --no-fund

      - name: Attach featured images from WXR (image:) and download assets
        env:
          XML_INPUT: ${{ github.event.inputs.xml_path }}
        run: |
          node --input-type=commonjs - <<'NODE'
          (async () => {
            const fs = require('fs');
            const path = require('path');
            const http = require('http');
            const https = require('https');
            const { parseStringPromise } = require('xml2js');

            const log = (...a)=>console.log('[featured]', ...a);

            function walk(dir){
              if (!fs.existsSync(dir)) return [];
              return fs.readdirSync(dir,{withFileTypes:true})
                .flatMap(e => { const p = path.join(dir, e.name); return e.isDirectory()? walk(p) : [p]; });
            }
            function ensureDir(p){ fs.mkdirSync(path.dirname(p), { recursive:true }); }
            function dl(url, dest){
              return new Promise((resolve,reject)=>{
                const client = url.startsWith('https') ? https : http;
                ensureDir(dest);
                client.get(url, res=>{
                  if (res.statusCode>=300 && res.statusCode<400 && res.headers.location){
                    return dl(res.headers.location, dest).then(resolve).catch(reject);
                  }
                  if (res.statusCode!==200) return reject(new Error('HTTP '+res.statusCode+' '+url));
                  const out = fs.createWriteStream(dest);
                  res.pipe(out); out.on('finish',()=>out.close(resolve));
                }).on('error', reject);
              });
            }
            function stripQuery(u){
              return u
                .replace(/%253f[^)"'\s>]*/ig,'')
                .replace(/%3f[^)"'\s>]*/ig,'')
                .replace(/(\.(png|jpe?g|gif|webp|svg))\?[^)"'\s>]*/ig,'$1');
            }
            // Map any of:
            //   https://warmycat.com/wp-content/uploads/YYYY/MM/file.ext?...
            //   https://*.files.wordpress.com/YYYY/MM/file.ext?...
            function toAssetsPath(abs){
              if (!abs) return null;
              let url = stripQuery(abs);
              try { url = decodeURIComponent(url); } catch {}
              url = url.replace(/\\/g,'/');

              let m = url.match(/https?:\/\/[^/]*files\.wordpress\.com\/(\d{4})\/(\d{2})\/([^?/#]+)$/i);
              if (m) {
                const [_, y, mm, file] = m;
                return path.join('assets','uploads', y, mm, file.toLowerCase());
              }
              m = url.match(/\/wp-content\/uploads\/(.+)$/i);
              if (m) {
                return path.join('assets','uploads', m[1].toLowerCase());
              }
              m = url.match(/\/(\d{4})\/(\d{2})\/([^/?#]+\.(?:png|jpe?g|gif|webp|svg))$/i);
              if (m) {
                const [_, y, mm, file] = m;
                return path.join('assets','uploads', y, mm, file.toLowerCase());
              }
              return null;
            }
            function readFrontMatter(s){
              if (!s.startsWith('---')) return null;
              const end = s.indexOf('\n---',3);
              if (end < 0) return null;
              return { fm: s.slice(0,end+4), body: s.slice(end+4) };
            }
            function getFmField(fm, key){
              const re = new RegExp(`\\n${key}:\\s*["']?(.+?)["']?\\s*\\n`,`i`);
              const m = fm.match(re); return m ? m[1].trim() : null;
            }
            const normalizeTitle = (t)=> (t||'').trim();

            // locate XML
            const xmlInput = process.env.XML_INPUT;
            let xmlFiles = [];
            if (xmlInput && fs.existsSync(xmlInput)) xmlFiles = [xmlInput];
            else if (fs.existsSync('import')) xmlFiles = walk('import').filter(f => f.endsWith('.xml'));

            log('XML files:', xmlFiles.length);
            const postFiles = walk('_posts').filter(f => /\.(md|markdown|html)$/i.test(f));
            log('Found posts:', postFiles.length);

            if (xmlFiles.length === 0 || postFiles.length === 0) return;

            // Build maps from WXR
            const featuredByPostId = new Map();
            const attachUrl = new Map();

            for (const xf of xmlFiles){
              const xml = fs.readFileSync(xf,'utf8');
              const data = await parseStringPromise(xml, { explicitArray:true });
              const chan = data?.rss?.channel?.[0];
              const items = chan?.item || [];
              log('WXR items:', items.length);

              // debug type counts
              const typeCount = {};
              for (const it of items){
                const type = (it['wp:post_type']||[''])[0];
                typeCount[type] = (typeCount[type]||0) + 1;
              }
              log('Type counts:', JSON.stringify(typeCount));

              // attachments -> url map
              for (const it of items){
                const type = (it['wp:post_type']||[''])[0];
                if (String(type) !== 'attachment') continue;
                const id = Number((it['wp:post_id']||['0'])[0]);
                const url = (it['wp:attachment_url']||[''])[0];
                if (id && url) attachUrl.set(id, url);
              }

              // posts -> thumbnail url
              for (const it of items){
                const type = (it['wp:post_type']||[''])[0];
                if (String(type) !== 'post') continue;
                const pid = Number((it['wp:post_id']||['0'])[0]);
                const metas = it['wp:postmeta'] || [];
                let thumbId = null;
                for (const m of metas){
                  const k = (m['wp:meta_key']||[''])[0];
                  if (k === '_thumbnail_id'){
                    thumbId = Number((m['wp:meta_value']||[''])[0]); break;
                  }
                }
                if (pid && thumbId && attachUrl.has(thumbId)){
                  featuredByPostId.set(pid, attachUrl.get(thumbId));
                }
              }
            }

            log('WXR mapped: byId=', featuredByPostId.size);

            // apply to posts
            let updated = 0, downloaded = 0, skipped = 0, unmatched = 0;

            for (const file of postFiles){
              const s = fs.readFileSync(file,'utf8');
              const fm = readFrontMatter(s);
              if (!fm){ unmatched++; continue; }

              const idm = fm.fm.match(/\b(wordpress_id|wp_id|post_id):\s*"?(\d+)"?/i);
              const pid = idm ? Number(idm[2]) : null;

              const url = pid ? featuredByPostId.get(pid) : null;
              if (!url){ unmatched++; continue; }

              const dest = toAssetsPath(url);
              if (!dest){ unmatched++; continue; }

              if (!fs.existsSync(dest)){
                try { await dl(url, dest); downloaded++; }
                catch(e){ log('download failed:', url, e.message); }
              }
              if (/\nimage:\s*["']?[^"'\n]+["']?\s*$/m.test(fm.fm)) { skipped++; continue; }

              const rel = '/' + dest.replace(/\\/g,'/');
              const injected = fm.fm.replace(/\n---\s*$/, `\nimage: "${rel}"\n---`);
              fs.writeFileSync(file, injected + fm.body);
              updated++;
            }

            log('featured summary => updated:', updated, ' downloaded:', downloaded, ' already-had-image:', skipped, ' unmatched:', unmatched);
          })().catch(err => { console.error(err); process.exit(1); });
          NODE

      # --- Normalize any leftover query strings in posts ---
      - name: Normalize image URLs in posts (strip ?w=, fix src/srcset, wp URLs)
        run: |
          node --input-type=commonjs - <<'NODE'
          const fs = require('fs'), path = require('path');
          function walk(dir){
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir,{withFileTypes:true})
              .flatMap(e=>{const p=path.join(dir,e.name); return e.isDirectory()?walk(p):[p];});
          }
          const files = walk('_posts').filter(f => /\.(md|markdown|html)$/i.test(f));
          const qInPath = /(\.(?:png|jpe?g|gif|webp|svg))(?:\?[^)"'\s>]+)/gi;
          const srcQuery  = /(src\s*=\s*")([^"?"]+)(\?[^"]*)(")/gi;
          const srcsetQuery = /(\s)([^,\s"]+?\.(?:png|jpe?g|gif|webp|svg))(?:\?[^,\s"]+)/gi;
          const wpUploads = /https?:\/\/[^"')]+\/wp-content\/uploads/gi;
          const toAssets  = '/assets/uploads';
          let changed = 0;
          for (const f of files) {
            let s = fs.readFileSync(f, 'utf8');
            const before = s;
            s = s.replace(qInPath,'$1')
                 .replace(srcQuery,   (_m,p1,p2,_q,p4)=>p1+p2+p4)
                 .replace(srcsetQuery,'$1$2')
                 .replace(wpUploads,toAssets)
                 .replace(/&amp;/g,'&');
            if (s !== before) { fs.writeFileSync(f, s); changed++; }
          }
          console.log('Normalized files:', changed);
          NODE

      - name: List generated files (debug)
        run: |
          echo "==== _posts ====" && ls -al _posts | sed -n '1,20p' || true
          echo "==== assets/uploads (count) ====" && (find assets/uploads -type f | wc -l || true)

      - name: Commit & push imported content
        run: |
          if [ -n "$(git status --porcelain _posts assets)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts assets
            git commit -m "chore(import): WordPress WXR → Markdown + featured images"
            git push
          else
            echo "No changes to commit."
          fi
