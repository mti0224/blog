name: Normalize image front-matter

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - "_posts/**"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Run normalizer
        run: |
          node --version
          node scripts/normalize_image_front_matter.js

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain _posts)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts
            git commit -m "chore: normalize image front-matter (move from body)"
            git push
          else
            echo "No changes."
          fi
