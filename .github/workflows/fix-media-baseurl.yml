name: Fix media baseurl in posts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rewrite /assets/... to use relative_url
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function walk(dir, out=[]) {
            if (!fs.existsSync(dir)) return out;
            for (const name of fs.readdirSync(dir)) {
              const p = path.join(dir, name);
              const st = fs.statSync(p);
              if (st.isDirectory()) walk(p, out);
              else if (/\.(md|markdown|html)$/i.test(name)) out.push(p);
            }
            return out;
          }

          const files = walk('_posts');
          const fixes = [
            // 1) Markdown 圖片：![](/assets/....png "title")
            {
              re: /(!\[[^\]]*\]\()\s*(\/assets\/[^)\s]+)(\s+"[^"]*")?\)/gi,
              fn: (m, p1, p2, p3='') => `${p1}{{ "${p2}" | relative_url }}${p3})`,
            },
            // 2) HTML <img src="/assets/...">
            {
              re: /(<img[^>]*\ssrc=)["'](\/assets\/[^"']+)["']/gi,
              fn: (m, p1, p2) => `${p1}'{{ "${p2}" | relative_url }}'`,
            },
            // 3) 連結 <a href="/assets/...">
            {
              re: /(<a[^>]*\shref=)["'](\/assets\/[^"']+)["']/gi,
              fn: (m, p1, p2) => `${p1}'{{ "${p2}" | relative_url }}'`,
            },
          ];

          let changed = 0;
          for (const f of files) {
            const before = fs.readFileSync(f, 'utf8');
            let after = before;
            for (const {re, fn} of fixes) after = after.replace(re, fn);
            if (after !== before) {
              fs.writeFileSync(f, after);
              changed++;
            }
          }
          console.log('Files rewritten:', changed);
          NODE

      - name: Commit changes (if any)
        run: |
          if [ -n "$(git status --porcelain _posts)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _posts
            git commit -m "fix: rewrite /assets URLs to use Liquid relative_url"
            git push
          else
            echo "No changes to commit."
          fi
