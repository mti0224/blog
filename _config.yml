title: 蚯蚓貓的資工人生
description: 個人筆記與 LINE Rangers
theme: minima

# 你的 GitHub Pages 網址
url: https://mti0224.github.io
# 你的子路徑
baseurl: /blog

# 語系
lang: zh-Hant

# 分頁（GitHub Pages 支援的舊版 paginate）
paginate: 12
paginate_path: "/page:num/"

plugins:
  - jekyll-paginate

# 文章連結樣式（保留你現在的年/月/日/標題）
permalink: /:year/:month/:day/:title/
slugify_mode: raw
encoding: utf-8

# 讓 markdown 和 highlighter 正常
markdown: kramdown
highlighter: rouge

# 靜態檔案路徑
defaults:
  - scope:
      path: ""
    values:
      layout: default

